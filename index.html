<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Run3D Mobile - V9.7 Ultra</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap');

        :root { --accent: #6366f1; --strava: #FC4C02; --bg: #020617; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); font-family: 'Inter', sans-serif; touch-action: manipulation; }
        
        #map { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

        .glass-ui {
            background: rgba(15, 23, 42, 0.95) !important;
            backdrop-filter: blur(30px) !important;
            -webkit-backdrop-filter: blur(30px) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8) !important;
        }

        /* Header */
        #top-header {
            position: fixed; top: calc(12px + env(safe-area-inset-top, 0px)); left: 16px; right: 16px;
            height: 72px; border-radius: 26px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 99999;
        }

        /* HUD Buttons */
        #hud-controls {
            position: fixed; right: 16px; bottom: 150px;
            display: flex; flex-direction: column; gap: 16px; z-index: 99999;
        }

        .hud-btn {
            width: 64px; height: 64px; border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            color: white; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
            background: rgba(30, 41, 59, 1);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hud-btn:active { transform: scale(0.85); background: var(--accent); }

        /* Dock - Final overlap fix */
        #main-dock {
            position: fixed; bottom: calc(24px + env(safe-area-inset-bottom, 0px)); 
            left: 16px; right: 16px; height: 96px; 
            border-radius: 34px; padding: 14px;
            z-index: 99999; overflow: hidden;
        }

        .dock-container { width: 100%; height: 100%; display: flex; gap: 12px; }

        .strava-btn {
            background: var(--strava);
            box-shadow: 0 8px 30px rgba(252, 76, 2, 0.5);
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .strava-btn:active { transform: scale(0.95); filter: brightness(1.2); }

        /* Drawer */
        #asset-drawer {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 75vh; transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 48px 48px 0 0; z-index: 100000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        #asset-drawer.open { transform: translateY(0); }

        .handle-bar {
            width: 60px; height: 6px; background: rgba(255,255,255,0.3);
            border-radius: 10px; margin: 12px auto 24px;
        }

        .spinning { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #settings-overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.99);
            z-index: 200000; display: none; align-items: center; justify-content: center; padding: 30px;
        }
        #settings-overlay.active { display: flex; }

        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="text-slate-100">

    <div id="map"></div>

    <!-- Redesigned Header with clear versioning -->
    <header id="top-header" class="glass-ui">
        <div class="flex items-center gap-4">
            <div class="bg-indigo-600 p-2.5 rounded-2xl shadow-lg shadow-indigo-600/40">
                <i data-lucide="mountain" class="w-6 h-6 text-white"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tighter leading-none text-white flex items-center gap-2">
                    Run3D Path <span class="bg-indigo-500/30 border border-indigo-400/50 text-[10px] px-2.5 py-0.5 rounded-full text-indigo-200">v9.7</span>
                </h1>
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-1">ULTRA MOBILE ENGINE</p>
            </div>
        </div>
        <div class="flex items-center gap-2 bg-black/50 px-4 py-2.5 rounded-full border border-white/10">
            <span class="text-[10px] font-black text-emerald-400 uppercase tracking-widest" id="engine-status">ONLINE</span>
            <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_15px_#10b981] animate-pulse"></div>
        </div>
    </header>

    <!-- Essential HUD Commands -->
    <div id="hud-controls">
        <button onclick="zoomToTrack()" class="hud-btn" id="mobile-fit-btn" title="Fit View">
            <i data-lucide="zoom-in" class="w-8 h-8"></i>
        </button>
        <button onclick="togglePitch()" class="hud-btn" title="Toggle 3D">
            <i data-lucide="box" class="w-8 h-8"></i>
        </button>
        <button onclick="resetCamera()" class="hud-btn" title="Reset Camera">
            <i data-lucide="compass" class="w-8 h-8"></i>
        </button>
        <button onclick="toggleDrawer()" class="hud-btn border-indigo-500/50" title="Open Drawer">
            <i data-lucide="library" class="w-8 h-8 text-indigo-400"></i>
        </button>
    </div>

    <!-- Main Command Dock (State Managed) -->
    <div id="main-dock" class="glass-ui">
        <!-- Disconnected Interface -->
        <div id="strava-unconnected" class="dock-container">
            <button onclick="connectStrava()" class="flex-1 strava-btn rounded-[26px] flex items-center justify-center gap-3 font-black text-xs uppercase tracking-widest text-white">
                <i data-lucide="link-2" class="w-6 h-6"></i> Connect Strava
            </button>
            <button onclick="toggleSettings()" class="w-[80px] glass-ui rounded-[26px] flex items-center justify-center text-slate-400 active:scale-90 transition-transform">
                <i data-lucide="settings-2" class="w-8 h-8"></i>
            </button>
        </div>

        <!-- Connected Interface -->
        <div id="strava-connected" class="dock-container" style="display: none;">
            <button id="sync-btn" onclick="fetchLatestStravaActivity()" class="w-[80px] glass-ui rounded-[26px] flex items-center justify-center active:scale-90 transition-transform">
                <i data-lucide="refresh-cw" id="sync-icon" class="w-8 h-8 text-indigo-400"></i>
            </button>
            <button id="flyover-btn" onclick="toggleFlyover()" class="flex-1 bg-indigo-600 rounded-[26px] flex items-center justify-center gap-3 font-black text-xs uppercase tracking-[0.2em] text-white shadow-2xl">
                <i data-lucide="play-circle" class="w-7 h-7 fill-current"></i> <span id="fly-text">TURBO CINEMA</span>
            </button>
        </div>
    </div>

    <!-- Data & Files Drawer -->
    <div id="asset-drawer" class="glass-ui p-8 overflow-hidden flex flex-col shadow-[0_-40px_80px_rgba(0,0,0,1)]">
        <div onclick="toggleDrawer()" class="w-full"><div class="handle-bar"></div></div>
        
        <div class="flex-1 overflow-y-auto space-y-12 custom-scroll pt-4">
            <section>
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-[13px] font-black uppercase text-slate-400 tracking-[0.4em]">Live Stats</h3>
                    <i data-lucide="bar-chart-big" class="w-6 h-6 text-indigo-500"></i>
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div class="p-8 bg-white/5 rounded-[40px] border border-white/5 shadow-inner">
                        <p class="text-[11px] text-slate-600 uppercase font-black mb-3">Distance</p>
                        <p id="stat-dist" class="text-4xl font-black text-indigo-400 tracking-tighter">0.00 <span class="text-sm text-slate-700">KM</span></p>
                    </div>
                    <div class="p-8 bg-white/5 rounded-[40px] border border-white/5 shadow-inner">
                        <p class="text-[11px] text-slate-600 uppercase font-black mb-3">Altitude</p>
                        <p id="stat-peak" class="text-4xl font-black text-emerald-400 tracking-tighter">0 <span class="text-sm text-slate-700">M</span></p>
                    </div>
                </div>
            </section>

            <section>
                <h3 class="text-[13px] font-black uppercase text-slate-400 tracking-[0.4em] mb-8">Import Center</h3>
                <div class="flex gap-6">
                    <button onclick="document.getElementById('gpx-input').click()" class="flex-1 py-8 bg-slate-800 rounded-[32px] text-[12px] font-black uppercase tracking-widest flex items-center justify-center gap-4 active:scale-95 transition-all">
                        <i data-lucide="upload-cloud" class="w-7 h-7 text-indigo-400"></i> GPX
                    </button>
                    <button onclick="document.getElementById('photo-input').click()" class="flex-1 py-8 bg-slate-800 rounded-[32px] text-[12px] font-black uppercase tracking-widest flex items-center justify-center gap-4 active:scale-95 transition-all">
                        <i data-lucide="camera" class="w-7 h-7 text-purple-400"></i> PHOTOS
                    </button>
                </div>
                <input type="file" id="gpx-input" class="hidden" accept=".gpx">
                <input type="file" id="photo-input" class="hidden" accept="image/*" multiple>
            </section>

            <div id="photo-grid" class="grid grid-cols-3 gap-5 pb-48"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-overlay">
        <div class="glass-ui p-12 rounded-[4rem] w-full max-w-sm space-y-10 border-indigo-500/20 border-2">
            <div class="text-center space-y-3">
                <h3 class="text-3xl font-black tracking-tighter text-white">SYSTEM KEYS</h3>
                <p class="text-[11px] text-slate-500 font-bold uppercase tracking-[0.2em]">Strava Integration</p>
            </div>
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-600 uppercase ml-4">Client ID</label>
                    <input type="text" id="input-client-id" class="w-full bg-black/80 border border-white/10 rounded-[24px] px-6 py-6 text-sm outline-none focus:border-indigo-500 transition-colors" placeholder="212229">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-600 uppercase ml-4">Client Secret</label>
                    <input type="password" id="input-client-secret" class="w-full bg-black/80 border border-white/10 rounded-[24px] px-6 py-6 text-sm outline-none focus:border-indigo-500 transition-colors" placeholder="••••••••">
                </div>
            </div>
            <div class="flex flex-col gap-4">
                <button onclick="saveApiSettings()" class="w-full py-6 bg-indigo-600 rounded-[24px] font-black text-xs uppercase tracking-widest shadow-2xl">Update Core</button>
                <button onclick="toggleSettings()" class="w-full py-2 text-slate-500 text-[11px] font-black uppercase">Dismiss</button>
            </div>
        </div>
    </div>

    <div id="photo-overlay" onclick="this.style.display='none'" class="fixed inset-0 z-[1000000] backdrop-blur-3xl hidden items-center justify-center p-10 transition-all">
        <div class="relative flex flex-col items-center gap-10">
            <img id="overlay-img" src="" alt="" class="rounded-[3.5rem] shadow-[0_0_120px_rgba(0,0,0,1)] border-4 border-white/15 max-h-[65vh] w-auto">
            <div class="bg-indigo-600 px-14 py-4 rounded-full font-black text-[13px] uppercase tracking-[0.5em] shadow-2xl">Snapshot Preview</div>
        </div>
    </div>

    <script>
        const CLIENT_ID_DEF = '212229';
        const CLIENT_SEC_DEF = '68086f28b4970e5856fd8f8d32a7b51df738174d';
        const MT_KEY = "MX9HHSfQg4Ieuv8eCGEY";

        let map, currentTrackCoords = [], waypointMarkers = [];
        let isFlyoverActive = false, flyoverRequestId = null, lastTimestamp = 0, flyoverCurrentDist = 0, flyoverBaseSpeed = 230, movieCursorMarker = null;

        // UI Core
        function toggleDrawer() { document.getElementById('asset-drawer').classList.toggle('open'); }
        function toggleSettings() { 
            const keys = getKeys();
            document.getElementById('input-client-id').value = keys.id;
            document.getElementById('input-client-secret').value = keys.secret;
            document.getElementById('settings-overlay').classList.toggle('active'); 
        }
        
        function updateStatus(msg) {
            const statusText = document.getElementById('engine-status');
            statusText.innerText = msg;
            statusText.style.color = '#818cf8';
            setTimeout(() => { statusText.style.color = ''; statusText.innerText = 'ONLINE'; }, 3000);
        }

        function getKeys() {
            return {
                id: localStorage.getItem('strava_api_id') || CLIENT_ID_DEF,
                secret: localStorage.getItem('strava_api_secret') || CLIENT_SEC_DEF
            };
        }

        function saveApiSettings() {
            const id = document.getElementById('input-client-id').value.trim();
            const secret = document.getElementById('input-client-secret').value.trim();
            if(id) localStorage.setItem('strava_api_id', id);
            if(secret) localStorage.setItem('strava_api_secret', secret);
            window.location.reload();
        }

        // Strava Logic (EXCLUSIVE STATES)
        function updateStravaUI(connected) {
            const unconnected = document.getElementById('strava-unconnected');
            const connectedUI = document.getElementById('strava-connected');
            
            if (connected) {
                unconnected.style.setProperty('display', 'none', 'important');
                connectedUI.style.setProperty('display', 'flex', 'important');
            } else {
                unconnected.style.setProperty('display', 'flex', 'important');
                connectedUI.style.setProperty('display', 'none', 'important');
            }
        }

        function connectStrava() {
            const keys = getKeys();
            const currentUrl = window.location.href.split('?')[0].split('#')[0];
            const url = `https://www.strava.com/oauth/authorize?client_id=${keys.id}&redirect_uri=${encodeURIComponent(currentUrl)}&response_type=code&scope=activity:read_all`;
            updateStatus("REDIRECTING...");
            const link = document.createElement('a');
            link.href = url; link.target = '_top'; 
            document.body.appendChild(link); link.click();
        }

        async function initAuth() {
            const code = new URLSearchParams(window.location.search).get('code');
            if(!code) {
                updateStravaUI(!!localStorage.getItem('strava_access_token'));
                return;
            }
            window.history.replaceState({}, document.title, window.location.pathname);
            updateStatus("AUTH...");
            try {
                const keys = getKeys();
                const res = await fetch('https://www.strava.com/oauth/token', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ client_id: keys.id, client_secret: keys.secret, code, grant_type: 'authorization_code' })
                });
                const data = await res.json();
                if(data.access_token) {
                    localStorage.setItem('strava_access_token', data.access_token);
                    updateStravaUI(true);
                    fetchLatestStravaActivity();
                }
            } catch(e) { updateStatus("AUTH FAIL"); }
        }

        async function fetchLatestStravaActivity() {
            const token = localStorage.getItem('strava_access_token');
            if(!token) return;
            const icon = document.getElementById('sync-icon');
            icon.classList.add('spinning');
            updateStatus("SYNCING...");
            try {
                const actsRes = await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=1', { headers: { 'Authorization': `Bearer ${token}` } });
                if(actsRes.status === 401) { localStorage.removeItem('strava_access_token'); updateStravaUI(false); return; }
                const activities = await actsRes.json();
                if(!activities.length) return updateStatus("EMPTY");
                const streamsRes = await fetch(`https://www.strava.com/api/v3/activities/${activities[0].id}/streams?keys=latlng,altitude&key_by_type=true`, { headers: { 'Authorization': `Bearer ${token}` } });
                const streams = await streamsRes.json();
                if(streams.latlng) { processStreams(streams); updateStatus("SYNCED"); }
            } catch(e) { updateStatus("ERROR"); } finally { icon.classList.remove('spinning'); }
        }

        function processStreams(streams) {
            const latlngs = streams.latlng.data, altitudes = streams.altitude ? streams.altitude.data : new Array(latlngs.length).fill(0);
            waypointMarkers.forEach(m => m.remove()); waypointMarkers = [];
            let total = 0, maxEle = -Infinity;
            currentTrackCoords = latlngs.map((pt, i) => {
                if(altitudes[i] > maxEle) maxEle = altitudes[i];
                if(i > 0) total += calculateDistance(latlngs[i-1][0], latlngs[i-1][1], pt[0], pt[1]);
                return [pt[1], pt[0], altitudes[i], total];
            });
            map.getSource('route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: currentTrackCoords.map(c => [c[0], c[1]]) } });
            addSign(currentTrackCoords[0], '#10b981', 'flag');
            addSign(currentTrackCoords[currentTrackCoords.length-1], '#ef4444', 'trophy');
            document.getElementById('stat-dist').innerHTML = `${(total/1000).toFixed(2)} <span class="text-xs">KM</span>`;
            document.getElementById('stat-peak').innerHTML = `${Math.round(maxEle)} <span class="text-xs">M</span>`;
            setTimeout(() => zoomToTrack(), 1200);
        }

        // Map Lib Core (Secure Proxy)
        async function secureMapInit() {
            try {
                const pLoc = { href: 'https://localhost/', protocol: 'https:', origin: 'https://localhost', host: 'localhost', hostname: 'localhost', pathname: '/', search: '', hash: '', toString: () => 'https://localhost/' };
                const wProxy = new Proxy(window, { get(t, p) { if (p === 'location') return pLoc; if (p === 'history') return { pushState: () => {}, replaceState: () => {}, state: null }; if (['URL', 'Blob', 'Worker', 'File', 'FileReader', 'navigator', 'document'].includes(p)) return window[p]; const v = window[p]; if (typeof v === 'function' && !p.startsWith('on')) { try { return v.bind(window); } catch(e) { return v; } } return v; } });
                const libRes = await fetch('https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js');
                const libCode = await libRes.text();
                const bundle = new Function('window', 'self', 'location', 'history', 'globalThis', `${libCode}; return maplibregl;`);
                window.maplibregl = bundle(wProxy, wProxy, pLoc, wProxy.history, wProxy);
                initMap();
            } catch (e) { initMap(); }
        }

        function initMap() {
            map = new window.maplibregl.Map({
                container: 'map', style: `https://api.maptiler.com/maps/hybrid/style.json?key=${MT_KEY}`,
                center: [0, 20], zoom: 2, pitch: 0, antialias: true, attributionControl: false, fadeDuration: 0
            });
            map.on('load', () => {
                map.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
                map.addLayer({ id: 'route-glow', type: 'line', source: 'route', paint: { 'line-color': '#4f46e5', 'line-width': 22, 'line-opacity': 0.15 } });
                map.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#818cf8', 'line-width': 5 } });
                map.addSource('terrain', { type: 'raster-dem', url: `https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${MT_KEY}`, tileSize: 256 });
                map.setTerrain({ source: 'terrain', exaggeration: 1.8 });
                lucide.createIcons();
            });
            window.addEventListener('resize', () => map.resize());
        }

        function zoomToTrack() {
            if(!currentTrackCoords.length || !map) return;
            updateStatus("LOCKED");
            map.resize();
            const bounds = new window.maplibregl.LngLatBounds();
            currentTrackCoords.forEach(c => bounds.extend([c[0], c[1]]));
            setTimeout(() => {
                map.resize();
                try { map.fitBounds(bounds, { padding: {top: 130, bottom: 230, left: 60, right: 60}, pitch: 45, duration: 3000, essential: true }); } 
                catch(e) { map.flyTo({ center: [currentTrackCoords[0][0], currentTrackCoords[0][1]], zoom: 16, duration: 2500 }); }
            }, 400);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3, φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180, Δφ = (lat2-lat1)*Math.PI/180, Δλ = (lon2-lon1)*Math.PI/180;
            return R * 2 * Math.atan2(Math.sqrt(Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2), Math.sqrt(1-(Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2)));
        }

        function resetCamera() { map.easeTo({ center: currentTrackCoords.length ? [currentTrackCoords[0][0], currentTrackCoords[0][1]] : [0,0], bearing: 0, pitch: 0, duration: 1500 }); }
        function togglePitch() { map.easeTo({ pitch: map.getPitch() > 10 ? 0 : 75, duration: 1000 }); }
        function addSign(pt, color, icon) {
            const el = document.createElement('div'); el.className = 'sign-marker w-10 h-10 rounded-full border-4 border-white shadow-xl flex items-center justify-center'; el.style.backgroundColor = color;
            el.innerHTML = `<i data-lucide="${icon}" class="text-white w-5 h-5"></i>`;
            waypointMarkers.push(new window.maplibregl.Marker({ element: el }).setLngLat([pt[0], pt[1]]).addTo(map));
            lucide.createIcons();
        }

        // Cinematic Loop
        function toggleFlyover() { isFlyoverActive ? stopFlyover() : startFlyover(); }
        function startFlyover() {
            if(!currentTrackCoords.length) return updateStatus("NO DATA");
            isFlyoverActive = true; flyoverCurrentDist = 0; lastTimestamp = performance.now();
            document.getElementById('fly-text').innerText = "ABORT";
            const el = document.createElement('div'); el.className = 'w-6 h-6 bg-indigo-500 border-4 border-white rounded-full shadow-[0_0_20px_#6366f1]';
            movieCursorMarker = new window.maplibregl.Marker({ element: el }).setLngLat([currentTrackCoords[0][0], currentTrackCoords[0][1]]).addTo(map);
            flyoverRequestId = requestAnimationFrame(flyoverLoop);
        }
        function stopFlyover() {
            isFlyoverActive = false; cancelAnimationFrame(flyoverRequestId);
            if(movieCursorMarker) { movieCursorMarker.remove(); movieCursorMarker = null; }
            document.getElementById('fly-text').innerText = "TURBO CINEMA";
        }
        function flyoverLoop(timestamp) {
            if(!isFlyoverActive || !map) return;
            const delta = (timestamp - lastTimestamp) / 1000; lastTimestamp = timestamp;
            flyoverCurrentDist += flyoverBaseSpeed * delta;
            if(flyoverCurrentDist >= currentTrackCoords[currentTrackCoords.length-1][3]) return stopFlyover();
            const pos = getPointAtDist(flyoverCurrentDist);
            const next = getPointAtDist(flyoverCurrentDist + 45);
            const bear = (Math.atan2(Math.sin((next[0]-pos[0])*Math.PI/180)*Math.cos(next[1]*Math.PI/180), Math.cos(pos[1]*Math.PI/180)*Math.sin(next[1]*Math.PI/180)-Math.sin(pos[1]*Math.PI/180)*Math.cos(next[1]*Math.PI/180)*Math.cos((next[0]-pos[0])*Math.PI/180))*180/Math.PI+360)%360;
            movieCursorMarker.setLngLat([pos[0], pos[1]]);
            map.jumpTo({ center: [pos[0], pos[1]], bearing: bear, pitch: 75, zoom: 18.5 });
            flyoverRequestId = requestAnimationFrame(flyoverLoop);
        }
        function getPointAtDist(d) {
            for(let i=0; i<currentTrackCoords.length-1; i++) {
                const p1 = currentTrackCoords[i], p2 = currentTrackCoords[i+1];
                if(d >= p1[3] && d <= p2[3]) {
                    const r = (d-p1[3])/(p2[3]-p1[3]);
                    return [p1[0]+(p2[0]-p1[0])*r, p1[1]+(p2[1]-p1[1])*r];
                }
            }
            return [currentTrackCoords[0][0], currentTrackCoords[0][1]];
        }

        // File Handlers
        document.getElementById('gpx-input').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const xml = (new DOMParser()).parseFromString(ev.target.result, "text/xml");
                const pts = Array.from(xml.getElementsByTagName("trkpt")).map(p => ({ lat: parseFloat(p.getAttribute("lat")), lon: parseFloat(p.getAttribute("lon")), ele: p.getElementsByTagName("ele")[0] ? parseFloat(p.getElementsByTagName("ele")[0].textContent) : 0 }));
                if (!pts.length) return updateStatus("INVALID");
                waypointMarkers.forEach(m => m.remove()); waypointMarkers = [];
                let total = 0, maxEle = -Infinity;
                currentTrackCoords = pts.map((p, i) => { if (p.ele > maxEle) maxEle = p.ele; if (i > 0) total += calculateDistance(pts[i-1].lat, pts[i-1].lon, p.lat, p.lon); return [p.lon, p.lat, p.ele, total]; });
                map.getSource('route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: currentTrackCoords.map(c => [c[0], c[1]]) } });
                addSign(currentTrackCoords[0], '#10b981', 'flag'); addSign(currentTrackCoords[currentTrackCoords.length-1], '#ef4444', 'trophy');
                document.getElementById('stat-dist').innerHTML = `${(total/1000).toFixed(2)} <span class="text-xs">KM</span>`;
                document.getElementById('stat-peak').innerHTML = `${Math.round(maxEle)} <span class="text-xs">M</span>`;
                setTimeout(() => zoomToTrack(), 800);
            };
            reader.readAsText(e.target.files[0]);
        });

        document.getElementById('photo-input').addEventListener('change', async (e) => {
            const grid = document.getElementById('photo-grid');
            for (const file of e.target.files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    EXIF.getData(file, function() {
                        const lat = EXIF.getTag(this, "GPSLatitude"), lon = EXIF.getTag(this, "GPSLongitude");
                        if (lat && lon) {
                            const dLat = (lat[0] + lat[1]/60 + lat[2]/3600) * (EXIF.getTag(this, "GPSLatitudeRef") === "S" ? -1 : 1);
                            const dLon = (lon[0] + lon[1]/60 + lat[2]/3600) * (EXIF.getTag(this, "GPSLongitudeRef") === "W" ? -1 : 1);
                            const el = document.createElement('div'); el.className = 'w-12 h-12 rounded-2xl border-4 border-white shadow-2xl bg-cover bg-center'; el.style.backgroundImage = `url(${ev.target.result})`;
                            el.onclick = () => { document.getElementById('overlay-img').src = ev.target.result; document.getElementById('photo-overlay').style.display = 'flex'; };
                            new window.maplibregl.Marker({ element: el }).setLngLat([dLon, dLat]).addTo(map);
                            const card = document.createElement('div'); card.className = 'aspect-square rounded-[30px] overflow-hidden border border-white/15 shadow-xl';
                            card.innerHTML = `<img src="${ev.target.result}" class="w-full h-full object-cover">`;
                            grid.appendChild(card);
                        }
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        window.onload = () => { secureMapInit(); initAuth(); };
    </script>
</body>
</html>
