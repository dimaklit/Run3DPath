<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Run3D Mobile - V10.3 Hyper Vision</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap');

        :root { --accent: #6366f1; --strava: #FC4C02; --bg: #020617; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); font-family: 'Inter', sans-serif; touch-action: manipulation; }
        
        #map { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

        .glass-ui {
            background: rgba(15, 23, 42, 0.95) !important;
            backdrop-filter: blur(30px) !important;
            -webkit-backdrop-filter: blur(30px) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8) !important;
        }

        /* Header */
        #top-header {
            position: fixed; top: calc(12px + env(safe-area-inset-top, 0px)); left: 16px; right: 16px;
            height: 72px; border-radius: 26px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 99999;
        }

        /* HUD Buttons */
        #hud-controls {
            position: fixed; right: 16px; bottom: 150px;
            display: flex; flex-direction: column; gap: 16px; z-index: 99999;
        }

        .hud-btn {
            width: 64px; height: 64px; border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            color: white; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
            background: rgba(30, 41, 59, 1);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hud-btn:active { transform: scale(0.85); background: var(--accent); }

        /* Dock */
        #main-dock {
            position: fixed; bottom: calc(24px + env(safe-area-inset-bottom, 0px)); 
            left: 16px; right: 16px; height: 96px; 
            border-radius: 34px; padding: 14px;
            z-index: 99999; display: flex; gap: 12px; align-items: center;
        }

        .dock-btn {
            height: 100%; border-radius: 24px; display: flex; 
            align-items: center; justify-content: center; transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .strava-btn { background: var(--strava); color: white; font-weight: 900; }
        .cinema-btn { background: var(--accent); color: white; font-weight: 900; }
        .settings-btn { background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); width: 70px; }
        .sync-btn-small { background: rgba(99, 102, 241, 0.15); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.2); width: 70px; }

        /* Waypoint Marker Graphics */
        .waypoint-container {
            display: flex; flex-direction: column; align-items: center;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.5));
        }
        .waypoint-container.popup { transform: scale(2.2); z-index: 1000; }
        
        .waypoint-icon {
            width: 44px; height: 44px; border-radius: 14px; border: 3px solid white;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2); position: relative;
        }
        .waypoint-icon::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 8px solid white;
        }
        .waypoint-label {
            margin-top: 12px; padding: 4px 10px; border-radius: 8px;
            background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.2);
            color: white; font-size: 8px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 0.1em; white-space: nowrap; backdrop-filter: blur(5px);
        }

        /* Drawer */
        #asset-drawer {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 75vh; transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 48px 48px 0 0; z-index: 100000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        #asset-drawer.open { transform: translateY(0); }

        .handle-bar {
            width: 60px; height: 6px; background: rgba(255,255,255,0.3);
            border-radius: 10px; margin: 12px auto 24px;
        }

        .spinning { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #settings-overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.99);
            z-index: 200000; display: none; align-items: center; justify-content: center; padding: 30px;
        }
        #settings-overlay.active { display: flex; }
        
        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="text-slate-100">

    <div id="map"></div>

    <!-- Header -->
    <header id="top-header" class="glass-ui">
        <div class="flex items-center gap-4">
            <div class="bg-indigo-600 p-2.5 rounded-2xl shadow-lg">
                <i data-lucide="mountain" class="w-6 h-6 text-white"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tighter leading-none text-white flex items-center gap-2">
                    Run3D Path <span class="bg-indigo-500/30 border border-indigo-400/50 text-[10px] px-2.5 py-0.5 rounded-full text-indigo-200">v10.3</span>
                </h1>
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-1">HYPER VISION ENGINE</p>
            </div>
        </div>
        <div class="flex items-center gap-2 bg-black/50 px-4 py-2.5 rounded-full border border-white/10">
            <span class="text-[10px] font-black text-emerald-400 uppercase tracking-widest" id="engine-status">ONLINE</span>
            <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_15px_#10b981] animate-pulse"></div>
        </div>
    </header>

    <!-- Map Controls -->
    <div id="hud-controls">
        <button onclick="zoomToTrack()" class="hud-btn" id="mobile-fit-btn" title="Fit View">
            <i data-lucide="zoom-in" class="w-8 h-8"></i>
        </button>
        <button onclick="togglePitch()" class="hud-btn" title="Toggle 3D">
            <i data-lucide="box" class="w-8 h-8"></i>
        </button>
        <button onclick="resetCamera()" class="hud-btn" title="Reset Camera">
            <i data-lucide="compass" class="w-8 h-8"></i>
        </button>
        <button onclick="toggleDrawer()" class="hud-btn border-indigo-500/50" title="Open Drawer">
            <i data-lucide="library" class="w-8 h-8 text-indigo-400"></i>
        </button>
    </div>

    <!-- Bottom Command Dock -->
    <div id="main-dock" class="glass-ui">
        <button id="btn-strava-connect" onclick="connectStrava()" class="dock-btn strava-btn flex-1 gap-3 uppercase text-[11px] tracking-widest">
            <i data-lucide="link-2" class="w-5 h-5"></i> Connect Strava
        </button>

        <button id="flyover-btn" onclick="toggleFlyover()" class="dock-btn cinema-btn flex-1 gap-3 uppercase text-[11px] tracking-widest" style="display: none;">
            <i data-lucide="play-circle" class="w-6 h-6 fill-current"></i> <span id="fly-text">TURBO CINEMA</span>
        </button>

        <button id="sync-btn-small" onclick="fetchLatestStravaActivity()" class="dock-btn sync-btn-small" style="display: none;">
            <i data-lucide="refresh-cw" id="sync-icon" class="w-7 h-7"></i>
        </button>

        <button onclick="toggleSettings()" class="dock-btn settings-btn" title="Settings">
            <i data-lucide="settings-2" class="w-7 h-7"></i>
        </button>
    </div>

    <!-- Asset Drawer -->
    <div id="asset-drawer" class="glass-ui p-8 overflow-hidden flex flex-col shadow-[0_-40px_80px_rgba(0,0,0,1)]">
        <div onclick="toggleDrawer()" class="w-full"><div class="handle-bar"></div></div>
        <div class="flex-1 overflow-y-auto space-y-12 custom-scroll pt-4">
            <section>
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-[13px] font-black uppercase text-slate-400 tracking-[0.4em]">Live Stats</h3>
                    <i data-lucide="bar-chart-big" class="w-6 h-6 text-indigo-500"></i>
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div class="p-8 bg-white/5 rounded-[40px] border border-white/5 shadow-inner">
                        <p class="text-[11px] text-slate-600 uppercase font-black mb-3">Distance</p>
                        <p id="stat-dist" class="text-4xl font-black text-indigo-400 tracking-tighter">0.00 <span class="text-sm text-slate-700">KM</span></p>
                    </div>
                    <div class="p-8 bg-white/5 rounded-[40px] border border-white/5 shadow-inner">
                        <p class="text-[11px] text-slate-600 uppercase font-black mb-3">Altitude</p>
                        <p id="stat-peak" class="text-4xl font-black text-emerald-400 tracking-tighter">0 <span class="text-sm text-slate-700">M</span></p>
                    </div>
                </div>
            </section>
            <section>
                <h3 class="text-[13px] font-black uppercase text-slate-400 tracking-[0.4em] mb-8">Import Center</h3>
                <div class="flex gap-6">
                    <button onclick="document.getElementById('gpx-input').click()" class="flex-1 py-8 bg-slate-800 rounded-[32px] text-[12px] font-black uppercase tracking-widest flex items-center justify-center gap-4 active:scale-95 transition-all">
                        <i data-lucide="upload-cloud" class="w-7 h-7 text-indigo-400"></i> GPX
                    </button>
                    <button onclick="document.getElementById('photo-input').click()" class="flex-1 py-8 bg-slate-800 rounded-[32px] text-[12px] font-black uppercase tracking-widest flex items-center justify-center gap-4 active:scale-95 transition-all">
                        <i data-lucide="camera" class="w-7 h-7 text-purple-400"></i> PHOTOS
                    </button>
                </div>
                <input type="file" id="gpx-input" class="hidden" accept=".gpx">
                <input type="file" id="photo-input" class="hidden" accept="image/*" multiple>
            </section>
            <div id="photo-grid" class="grid grid-cols-3 gap-5 pb-48"></div>
        </div>
    </div>

    <!-- Settings Overlay -->
    <div id="settings-overlay">
        <div class="glass-ui p-12 rounded-[4rem] w-full max-w-sm space-y-10 border-indigo-500/20 border-2">
            <h3 class="text-3xl font-black tracking-tighter text-white text-center">SYSTEM KEYS</h3>
            <div class="space-y-6">
                <input type="text" id="input-client-id" class="w-full bg-black/80 border border-white/10 rounded-[24px] px-6 py-6 text-sm outline-none focus:border-indigo-500" placeholder="Client ID">
                <input type="password" id="input-client-secret" class="w-full bg-black/80 border border-white/10 rounded-[24px] px-6 py-6 text-sm outline-none focus:border-indigo-500" placeholder="Client Secret">
            </div>
            <div class="flex flex-col gap-4">
                <button onclick="saveApiSettings()" class="w-full py-6 bg-indigo-600 rounded-[24px] font-black text-xs uppercase tracking-widest shadow-2xl">Update Core</button>
                <button id="logout-btn" onclick="disconnectStrava()" class="w-full py-4 bg-red-500/10 border border-red-500/30 text-red-500 rounded-[20px] font-black text-[10px] uppercase">Logout from Strava</button>
                <button onclick="toggleSettings()" class="w-full py-2 text-slate-500 text-[11px] font-black uppercase">Dismiss</button>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID_DEF = '212229';
        const CLIENT_SEC_DEF = '68086f28b4970e5856fd8f8d32a7b51df738174d';
        const MT_KEY = "MX9HHSfQg4Ieuv8eCGEY";

        let map, currentTrackCoords = [], waypointMarkers = [];
        let isFlyoverActive = false, flyoverRequestId = null, lastTimestamp = 0, flyoverCurrentDist = 0, flyoverBaseSpeed = 230, movieCursorMarker = null;

        function toggleDrawer() { document.getElementById('asset-drawer').classList.toggle('open'); }
        function toggleSettings() { 
            const keys = getKeys();
            document.getElementById('input-client-id').value = keys.id;
            document.getElementById('input-client-secret').value = keys.secret;
            const token = localStorage.getItem('strava_access_token');
            document.getElementById('logout-btn').style.display = token ? 'block' : 'none';
            document.getElementById('settings-overlay').classList.toggle('active'); 
        }
        
        function updateStatus(msg) {
            const statusText = document.getElementById('engine-status');
            statusText.innerText = msg;
            statusText.style.color = '#10b981';
            setTimeout(() => { statusText.style.color = ''; statusText.innerText = 'ONLINE'; }, 3000);
        }

        function getKeys() {
            return {
                id: localStorage.getItem('strava_api_id') || CLIENT_ID_DEF,
                secret: localStorage.getItem('strava_api_secret') || CLIENT_SEC_DEF
            };
        }

        function saveApiSettings() {
            const id = document.getElementById('input-client-id').value.trim();
            const secret = document.getElementById('input-client-secret').value.trim();
            if(id) localStorage.setItem('strava_api_id', id);
            if(secret) localStorage.setItem('strava_api_secret', secret);
            window.location.reload();
        }

        function updateStravaUI(connected) {
            const connectBtn = document.getElementById('btn-strava-connect');
            const cinemaBtn = document.getElementById('flyover-btn');
            const syncBtn = document.getElementById('sync-btn-small');
            if (connected) {
                connectBtn.style.display = 'none';
                cinemaBtn.style.display = 'flex';
                syncBtn.style.display = 'flex';
            } else {
                connectBtn.style.display = 'flex';
                cinemaBtn.style.display = 'none';
                syncBtn.style.display = 'none';
            }
        }

        function connectStrava() {
            const keys = getKeys();
            const currentUrl = window.location.href.split('?')[0].split('#')[0];
            const url = `https://www.strava.com/oauth/authorize?client_id=${keys.id}&redirect_uri=${encodeURIComponent(currentUrl)}&response_type=code&scope=activity:read_all`;
            updateStatus("REDIRECTING...");
            const link = document.createElement('a');
            link.href = url; link.target = '_top'; 
            document.body.appendChild(link); link.click();
        }

        function disconnectStrava() {
            localStorage.removeItem('strava_access_token');
            updateStravaUI(false);
            toggleSettings();
            updateStatus("LOGGED OUT");
        }

        async function initAuth() {
            const code = new URLSearchParams(window.location.search).get('code');
            if(!code) {
                updateStravaUI(!!localStorage.getItem('strava_access_token'));
                return;
            }
            window.history.replaceState({}, document.title, window.location.pathname);
            updateStatus("AUTH...");
            try {
                const keys = getKeys();
                const res = await fetch('https://www.stra
