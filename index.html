<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Run3D Mobile - V9.4 Prime</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap');

        :root { --accent: #6366f1; --strava: #FC4C02; --bg: #020617; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); font-family: 'Inter', sans-serif; touch-action: manipulation; }
        
        #map { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

        /* Элементы управления с эффектом размытия */
        .glass-ui {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* Верхний заголовок */
        #top-header {
            position: fixed; top: env(safe-area-inset-top, 10px); left: 16px; right: 16px;
            height: 60px; border-radius: 20px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000;
        }

        /* Блок кнопок HUD справа */
        #hud-controls {
            position: fixed; right: 16px; bottom: 140px;
            display: flex; flex-direction: column; gap: 12px; z-index: 1000;
        }

        .hud-btn {
            width: 56px; height: 56px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            color: white; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }
        .hud-btn:active { transform: scale(0.9); background: var(--accent); }

        /* Нижний док управления */
        #main-dock {
            position: fixed; bottom: calc(24px + env(safe-area-inset-bottom, 0px)); 
            left: 16px; right: 16px; height: 86px; 
            border-radius: 28px; padding: 12px;
            display: flex; align-items: center; z-index: 1000;
        }

        .strava-btn {
            background: var(--strava);
            box-shadow: 0 8px 25px rgba(252, 76, 2, 0.4);
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .strava-btn:active { transform: scale(0.97); filter: brightness(1.1); }

        /* Выдвижная панель */
        #asset-drawer {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 75vh; transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 36px 36px 0 0; z-index: 2000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        #asset-drawer.open { transform: translateY(0); }

        .handle-bar {
            width: 44px; height: 5px; background: rgba(255,255,255,0.2);
            border-radius: 10px; margin: 12px auto 20px;
        }

        .spinning { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #settings-overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98);
            z-index: 4000; display: none; align-items: center; justify-content: center; padding: 30px;
        }
        #settings-overlay.active { display: flex; }

        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="text-slate-100">

    <div id="map"></div>

    <!-- Visible Header with Version -->
    <header id="top-header" class="glass-ui">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg">
                <i data-lucide="mountain" class="w-5 h-5 text-white"></i>
            </div>
            <div>
                <h1 class="text-sm font-black tracking-tight leading-none">Run3D Path</h1>
                <p class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest mt-1">v9.4 Mobile</p>
            </div>
        </div>
        <div id="status-indicator" class="flex items-center gap-2">
            <span class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter mr-1" id="engine-status">Engine Ready</span>
            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
        </div>
    </header>

    <!-- Map HUD Controls -->
    <div id="hud-controls">
        <button onclick="zoomToTrack()" class="hud-btn glass-ui" id="mobile-fit-btn" title="Fit View">
            <i data-lucide="expand" class="w-6 h-6"></i>
        </button>
        <button onclick="togglePitch()" class="hud-btn glass-ui" title="Toggle 3D">
            <i data-lucide="box" class="w-6 h-6"></i>
        </button>
        <button onclick="resetCamera()" class="hud-btn glass-ui" title="North Up">
            <i data-lucide="compass" class="w-6 h-6"></i>
        </button>
        <button onclick="toggleDrawer()" class="hud-btn glass-ui border-indigo-500/30" title="Stats & Photos">
            <i data-lucide="layout-grid" class="w-6 h-6 text-indigo-400"></i>
        </button>
    </div>

    <!-- Main Action Dock (Strava is here) -->
    <div id="main-dock" class="glass-ui">
        <!-- Not Connected -->
        <div id="strava-unconnected" class="w-full h-full flex gap-3">
            <button onclick="connectStrava()" class="flex-1 strava-btn rounded-[20px] flex items-center justify-center gap-3 font-black text-xs uppercase tracking-widest text-white shadow-lg">
                <i data-lucide="link-2" class="w-5 h-5"></i> Connect Strava
            </button>
            <button onclick="toggleSettings()" class="w-[68px] glass-ui rounded-[20px] flex items-center justify-center text-slate-400 active:scale-90 transition-transform">
                <i data-lucide="settings-2" class="w-6 h-6"></i>
            </button>
        </div>

        <!-- Connected -->
        <div id="strava-connected" class="hidden w-full h-full flex gap-3">
            <button id="sync-btn" onclick="fetchLatestStravaActivity()" class="w-[68px] glass-ui rounded-[20px] flex items-center justify-center active:scale-90 transition-transform">
                <i data-lucide="refresh-cw" id="sync-icon" class="w-6 h-6 text-indigo-400"></i>
            </button>
            <button id="flyover-btn" onclick="toggleFlyover()" class="flex-1 bg-indigo-600 rounded-[20px] flex items-center justify-center gap-3 font-black text-xs uppercase tracking-[0.15em] text-white shadow-xl shadow-indigo-600/20">
                <i data-lucide="play-circle" class="w-5 h-5 fill-current"></i> <span id="fly-text">Launch Cinema</span>
            </button>
        </div>
    </div>

    <!-- Drawer Panel -->
    <div id="asset-drawer" class="glass-ui p-8 overflow-hidden flex flex-col shadow-[0_-20px_50px_rgba(0,0,0,0.6)]">
        <div onclick="toggleDrawer()" class="w-full"><div class="handle-bar"></div></div>
        
        <div class="flex-1 overflow-y-auto space-y-10 custom-scroll pt-2">
            <section>
                <h3 class="text-[11px] font-black uppercase text-slate-500 tracking-[0.25em] mb-6 flex items-center gap-2">
                    <i data-lucide="trending-up" class="w-4 h-4"></i> Performance Data
                </h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-6 bg-white/5 rounded-[28px] border border-white/5 shadow-inner">
                        <p class="text-[10px] text-slate-600 uppercase font-bold mb-2">Distance</p>
                        <p id="stat-dist" class="text-2xl font-black text-indigo-400">0.00 <span class="text-[10px] text-slate-700">KM</span></p>
                    </div>
                    <div class="p-6 bg-white/5 rounded-[28px] border border-white/5 shadow-inner">
                        <p class="text-[10px] text-slate-600 uppercase font-bold mb-2">Elevation</p>
                        <p id="stat-peak" class="text-2xl font-black text-emerald-400">0 <span class="text-[10px] text-slate-700">M</span></p>
                    </div>
                </div>
            </section>

            <section>
                <h3 class="text-[11px] font-black uppercase text-slate-500 tracking-[0.25em] mb-6 flex items-center gap-2">
                    <i data-lucide="folder-search" class="w-4 h-4"></i> Local Overlays
                </h3>
                <div class="flex gap-4">
                    <button onclick="document.getElementById('gpx-input').click()" class="flex-1 py-5 bg-slate-800/80 rounded-3xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-3">
                        <i data-lucide="file-up" class="w-4 h-4 text-indigo-400"></i> GPX
                    </button>
                    <button onclick="document.getElementById('photo-input').click()" class="flex-1 py-5 bg-slate-800/80 rounded-3xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-3">
                        <i data-lucide="image-plus" class="w-4 h-4 text-purple-400"></i> Photos
                    </button>
                </div>
                <input type="file" id="gpx-input" class="hidden" accept=".gpx">
                <input type="file" id="photo-input" class="hidden" accept="image/*" multiple>
            </section>

            <div id="photo-grid" class="grid grid-cols-3 gap-3 pb-32"></div>
        </div>
    </div>

    <!-- API Overlay -->
    <div id="settings-overlay">
        <div class="bg-slate-900 border border-white/10 p-10 rounded-[3rem] w-full max-w-sm space-y-8 shadow-2xl">
            <div class="text-center">
                <h3 class="text-2xl font-black tracking-tighter text-white">DEVELOPER KEYS</h3>
                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1">Strava API Configuration</p>
            </div>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-600 uppercase ml-2">Client ID</label>
                    <input type="text" id="input-client-id" class="w-full bg-black/40 border border-white/5 rounded-2xl px-5 py-4 text-sm outline-none focus:border-indigo-500" placeholder="212229">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-600 uppercase ml-2">Client Secret</label>
                    <input type="password" id="input-client-secret" class="w-full bg-black/40 border border-white/5 rounded-2xl px-5 py-4 text-sm outline-none focus:border-indigo-500" placeholder="••••••••">
                </div>
            </div>
            <div class="flex flex-col gap-3">
                <button onclick="saveApiSettings()" class="w-full py-5 bg-indigo-600 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-600/20">Update Keys</button>
                <button onclick="toggleSettings()" class="w-full py-2 text-slate-600 text-[10px] font-bold uppercase">Go Back</button>
            </div>
        </div>
    </div>

    <div id="photo-overlay" onclick="this.style.display='none'" class="fixed inset-0 z-[5000] backdrop-blur-2xl hidden items-center justify-center p-6 transition-all">
        <div class="relative flex flex-col items-center gap-6">
            <img id="overlay-img" src="" alt="" class="rounded-[2rem] shadow-2xl border-4 border-white/10 max-h-[75vh] w-auto">
            <div class="bg-indigo-600 px-10 py-3.5 rounded-full font-black text-[11px] uppercase tracking-[0.3em] shadow-2xl">Visual Capture</div>
        </div>
    </div>

    <script>
        // --- DATA ---
        const CLIENT_ID_DEF = '212229';
        const CLIENT_SEC_DEF = '68086f28b4970e5856fd8f8d32a7b51df738174d';
        const MT_KEY = "MX9HHSfQg4Ieuv8eCGEY";

        let map, currentTrackCoords = [], waypointMarkers = [];
        let isFlyoverActive = false, flyoverRequestId = null, lastTimestamp = 0, flyoverCurrentDist = 0, flyoverBaseSpeed = 230, movieCursorMarker = null;

        // --- UI CORE ---
        function toggleDrawer() { document.getElementById('asset-drawer').classList.toggle('open'); }
        function toggleSettings() { 
            const keys = getKeys();
            document.getElementById('input-client-id').value = keys.id;
            document.getElementById('input-client-secret').value = keys.secret;
            document.getElementById('settings-overlay').classList.toggle('active'); 
        }
        
        function updateStatus(msg) {
            const statusText = document.getElementById('engine-status');
            statusText.innerText = msg;
            statusText.classList.add('text-indigo-400');
            setTimeout(() => statusText.classList.remove('text-indigo-400'), 2000);
        }

        function getKeys() {
            return {
                id: localStorage.getItem('strava_api_id') || CLIENT_ID_DEF,
                secret: localStorage.getItem('strava_api_secret') || CLIENT_SEC_DEF
            };
        }

        function saveApiSettings() {
            const id = document.getElementById('input-client-id').value.trim();
            const secret = document.getElementById('input-client-secret').value.trim();
            if(id) localStorage.setItem('strava_api_id', id);
            if(secret) localStorage.setItem('strava_api_secret', secret);
            window.location.reload();
        }

        // --- STRAVA BRIDGE ---
        function connectStrava() {
            const keys = getKeys();
            const currentUrl = window.location.href.split('?')[0].split('#')[0];
            const url = `https://www.strava.com/oauth/authorize?client_id=${keys.id}&redirect_uri=${encodeURIComponent(currentUrl)}&response_type=code&scope=activity:read_all`;
            
            updateStatus("REDIRECTING...");
            
            const link = document.createElement('a');
            link.href = url;
            link.target = '_top'; 
            document.body.appendChild(link);
            link.click();
        }

        async function initApp() {
            const code = new URLSearchParams(window.location.search).get('code');
            if(!code) {
                const token = localStorage.getItem('strava_access_token');
                updateStravaUI(!!token);
                return;
            }
            window.history.replaceState({}, document.title, window.location.pathname);
            updateStatus("AUTHENTICATING...");
            try {
                const keys = getKeys();
                const res = await fetch('https://www.strava.com/oauth/token', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ client_id: keys.id, client_secret: keys.secret, code, grant_type: 'authorization_code' })
                });
                const data = await res.json();
                if(data.access_token) {
                    localStorage.setItem('strava_access_token', data.access_token);
                    updateStravaUI(true);
                    fetchLatestStravaActivity();
                }
            } catch(e) { updateStatus("AUTH ERROR"); }
        }

        function updateStravaUI(connected) {
            document.getElementById('strava-unconnected').classList.toggle('hidden', connected);
            document.getElementById('strava-connected').classList.toggle('hidden', !connected);
        }

        async function fetchLatestStravaActivity() {
            const token = localStorage.getItem('strava_access_token');
            if(!token) return;
            const icon = document.getElementById('sync-icon');
            icon.classList.add('spinning');
            updateStatus("DOWNLOADING...");
            
            try {
                const actsRes = await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=1', { headers: { 'Authorization': `Bearer ${token}` } });
                if(actsRes.status === 401) { 
                    localStorage.removeItem('strava_access_token'); 
                    updateStravaUI(false); 
                    return updateStatus("RE-LOGIN REQUIRED"); 
                }
                
                const activities = await actsRes.json();
                if(!activities.length) return updateStatus("NO ACTIVITIES");

                const streamsRes = await fetch(`https://www.strava.com/api/v3/activities/${activities[0].id}/streams?keys=latlng,altitude&key_by_type=true`, { headers: { 'Authorization': `Bearer ${token}` } });
                const streams = await streamsRes.json();

                if(streams.latlng) {
                    processStreams(streams);
                    updateStatus("PATH READY");
                }
            } catch(e) { updateStatus("API ERROR"); }
            finally { icon.classList.remove('spinning'); }
        }

        function processStreams(streams) {
            const latlngs = streams.latlng.data, altitudes = streams.altitude ? streams.altitude.data : new Array(latlngs.length).fill(0);
            waypointMarkers.forEach(m => m.remove()); waypointMarkers = [];
            let total = 0, maxEle = -Infinity;
            currentTrackCoords = latlngs.map((pt, i) => {
                if(altitudes[i] > maxEle) maxEle = altitudes[i];
                if(i > 0) total += calculateDistance(latlngs[i-1][0], latlngs[i-1][1], pt[0], pt[1]);
                return [pt[1], pt[0], altitudes[i], total];
            });
            map.getSource('route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: currentTrackCoords.map(c => [c[0], c[1]]) } });
            addSign(currentTrackCoords[0], '#10b981', 'flag');
            addSign(currentTrackCoords[currentTrackCoords.length-1], '#ef4444', 'trophy');
            document.getElementById('stat-dist').innerHTML = `${(total/1000).toFixed(2)} <span class="text-[10px] opacity-40">KM</span>`;
            document.getElementById('stat-peak').innerHTML = `${Math.round(maxEle)} <span class="text-[10px] opacity-40">M</span>`;
            
            setTimeout(() => zoomToTrack(), 1000);
        }

        // --- MAP CORE (SECURE BOOT) ---
        async function secureMapInit() {
            try {
                const proxyLocation = { 
                    href: 'https://localhost/', protocol: 'https:', origin: 'https://localhost',
                    host: 'localhost', hostname: 'localhost', pathname: '/', search: '', hash: '', toString: () => 'https://localhost/'
                };
                const windowProxy = new Proxy(window, {
                    get(t, p) {
                        if (p === 'location') return proxyLocation;
                        if (p === 'history') return { pushState: () => {}, replaceState: () => {}, state: null };
                        if (['URL', 'Blob', 'Worker', 'File', 'FileReader', 'navigator', 'document'].includes(p)) return window[p];
                        const v = window[p];
                        if (typeof v === 'function' && !p.startsWith('on')) { try { return v.bind(window); } catch(e) { return v; } }
                        return v;
                    }
                });
                const libRes = await fetch('https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js');
                const libCode = await libRes.text();
                const bundle = new Function('window', 'self', 'location', 'history', 'globalThis', `${libCode}; return maplibregl;`);
                window.maplibregl = bundle(windowProxy, windowProxy, proxyLocation, windowProxy.history, windowProxy);
                
                initMap();
            } catch (e) { initMap(); }
        }

        function initMap() {
            map = new window.maplibregl.Map({
                container: 'map', style: `https://api.maptiler.com/maps/hybrid/style.json?key=${MT_KEY}`,
                center: [0, 20], zoom: 2, pitch: 0, antialias: true, attributionControl: false,
                refreshExpiredTiles: false, fadeDuration: 0
            });

            map.on('load', () => {
                map.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
                map.addLayer({ id: 'route-glow', type: 'line', source: 'route', paint: { 'line-color': '#4f46e5', 'line-width': 16, 'line-opacity': 0.2 } });
                map.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#818cf8', 'line-width': 4 } });
                map.addSource('terrain', { type: 'raster-dem', url: `https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${MT_KEY}`, tileSize: 256 });
                map.setTerrain({ source: 'terrain', exaggeration: 1.7 });
                lucide.createIcons();
                initApp();
            });
            window.addEventListener('resize', () => map.resize());
        }

        // --- ULTRA-STABLE FIT VIEW ---
        function zoomToTrack() {
            if(!currentTrackCoords.length || !map) return;
            updateStatus("FITTING VIEW...");
            
            map.resize();
            const bounds = new window.maplibregl.LngLatBounds();
            currentTrackCoords.forEach(c => bounds.extend([c[0], c[1]]));

            setTimeout(() => {
                map.resize();
                try {
                    map.fitBounds(bounds, { 
                        padding: {top: 100, bottom: 180, left: 40, right: 40}, 
                        pitch: 45, 
                        duration: 2500, 
                        essential: true 
                    });
                } catch(e) {
                    map.flyTo({ center: [currentTrackCoords[0][0], currentTrackCoords[0][1]], zoom: 15, duration: 2000 });
                }
            }, 300);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3, φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180, Δφ = (lat2-lat1)*Math.PI/180, Δλ = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function resetCamera() { map.easeTo({ center: currentTrackCoords.length ? [currentTrackCoords[0][0], currentTrackCoords[0][1]] : [0,0], bearing: 0, pitch: 0, duration: 1500 }); }
        function togglePitch() { map.easeTo({ pitch: map.getPitch() > 10 ? 0 : 72, duration: 1000 }); }
        function addSign(pt, color, icon) {
            const el = document.createElement('div'); el.className = 'sign-marker'; el.style.backgroundColor = color;
            el.innerHTML = `<i data-lucide="${icon}" class="text-white w-4 h-4"></i>`;
            waypointMarkers.push(new window.maplibregl.Marker({ element: el }).setLngLat([pt[0], pt[1]]).addTo(map));
            lucide.createIcons();
        }

        // Cinematic 
        function toggleFlyover() { isFlyoverActive ? stopFlyover() : startFlyover(); }
        function startFlyover() {
            if(!currentTrackCoords.length) return updateStatus("NO DATA");
            isFlyoverActive = true; flyoverCurrentDist = 0; lastTimestamp = performance.now();
            document.getElementById('fly-text').innerText = "Abort Mission";
            const el = document.createElement('div'); el.className = 'movie-cursor';
            movieCursorMarker = new window.maplibregl.Marker({ element: el }).setLngLat([currentTrackCoords[0][0], currentTrackCoords[0][1]]).addTo(map);
            flyoverRequestId = requestAnimationFrame(flyoverLoop);
        }
        function stopFlyover() {
            isFlyoverActive = false; cancelAnimationFrame(flyoverRequestId);
            if(movieCursorMarker) { movieCursorMarker.remove(); movieCursorMarker = null; }
            document.getElementById('fly-text').innerText = "Launch Cinema";
        }
        function flyoverLoop(timestamp) {
            if(!isFlyoverActive || !map) return;
            const delta = (timestamp - lastTimestamp) / 1000; lastTimestamp = timestamp;
            flyoverCurrentDist += flyoverBaseSpeed * delta;
            if(flyoverCurrentDist >= currentTrackCoords[currentTrackCoords.length-1][3]) return stopFlyover();
            const pos = getPointAtDist(flyoverCurrentDist);
            const next = getPointAtDist(flyoverCurrentDist + 40);
            const bear = calculateBearing(pos[1], pos[0], next[1], next[0]);
            movieCursorMarker.setLngLat([pos[0], pos[1]]);
            map.jumpTo({ center: [pos[0], pos[1]], bearing: bear, pitch: 75, zoom: 18.2 });
            flyoverRequestId = requestAnimationFrame(flyoverLoop);
        }
        function getPointAtDist(d) {
            for(let i=0; i<currentTrackCoords.length-1; i++) {
                const p1 = currentTrackCoords[i], p2 = currentTrackCoords[i+1];
                if(d >= p1[3] && d <= p2[3]) {
                    const r = (d-p1[3])/(p2[3]-p1[3]);
                    return [p1[0]+(p2[0]-p1[0])*r, p1[1]+(p2[1]-p1[1])*r];
                }
            }
            return [currentTrackCoords[0][0], currentTrackCoords[0][1]];
        }
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const φ1 = lat1*Math.PI/180, φ2 = lat2*Math.PI/180, Δλ = (lon2-lon1)*Math.PI/180;
            return (Math.atan2(Math.sin(Δλ)*Math.cos(φ2), Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ))*180/Math.PI+360)%360;
        }

        // --- FILE IMPORTS ---
        document.getElementById('gpx-input').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const xml = (new DOMParser()).parseFromString(ev.target.result, "text/xml");
                const pts = Array.from(xml.getElementsByTagName("trkpt")).map(p => ({ lat: parseFloat(p.getAttribute("lat")), lon: parseFloat(p.getAttribute("lon")), ele: p.getElementsByTagName("ele")[0] ? parseFloat(p.getElementsByTagName("ele")[0].textContent) : 0 }));
                if (!pts.length) return updateStatus("INVALID GPX");
                waypointMarkers.forEach(m => m.remove()); waypointMarkers = [];
                let total = 0, maxEle = -Infinity;
                currentTrackCoords = pts.map((p, i) => { if (p.ele > maxEle) maxEle = p.ele; if (i > 0) total += calculateDistance(pts[i-1].lat, pts[i-1].lon, p.lat, p.lon); return [p.lon, p.lat, p.ele, total]; });
                map.getSource('route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: currentTrackCoords.map(c => [c[0], c[1]]) } });
                addSign(currentTrackCoords[0], '#10b981', 'flag'); addSign(currentTrackCoords[currentTrackCoords.length-1], '#ef4444', 'trophy');
                document.getElementById('stat-dist').innerHTML = `${(total/1000).toFixed(2)} <span class="text-xs">km</span>`;
                document.getElementById('stat-peak').innerHTML = `${Math.round(maxEle)} <span class="text-xs">m</span>`;
                setTimeout(() => zoomToTrack(), 600);
            };
            reader.readAsText(e.target.files[0]);
        });

        document.getElementById('photo-input').addEventListener('change', async (e) => {
            const grid = document.getElementById('photo-grid');
            for (const file of e.target.files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    EXIF.getData(file, function() {
                        const lat = EXIF.getTag(this, "GPSLatitude"), lon = EXIF.getTag(this, "GPSLongitude");
                        if (lat && lon) {
                            const dLat = (lat[0] + lat[1]/60 + lat[2]/3600) * (EXIF.getTag(this, "GPSLatitudeRef") === "S" ? -1 : 1);
                            const dLon = (lon[0] + lon[1]/60 + lat[2]/3600) * (EXIF.getTag(this, "GPSLongitudeRef") === "W" ? -1 : 1);
                            const el = document.createElement('div'); el.className = 'photo-marker shadow-2xl'; el.style.backgroundImage = `url(${ev.target.result})`;
                            el.onclick = () => { document.getElementById('overlay-img').src = ev.target.result; document.getElementById('photo-overlay').style.display = 'flex'; };
                            new window.maplibregl.Marker({ element: el }).setLngLat([dLon, dLat]).addTo(map);
                            const card = document.createElement('div'); card.className = 'aspect-square rounded-2xl overflow-hidden border border-white/10';
                            card.innerHTML = `<img src="${ev.target.result}" class="w-full h-full object-cover">`;
                            grid.appendChild(card);
                        }
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        window.onload = secureMapInit;
    </script>
</body>
