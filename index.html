<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Run3D Mobile - V9.2 Prime Fix</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');

        :root { --accent: #6366f1; --strava: #FC4C02; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: #020617; font-family: 'Inter', sans-serif; touch-action: manipulation; }
        
        #map { position: absolute; inset: 0; width: 100%; height: 100%; }

        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #map-actions {
            position: fixed; right: 16px; bottom: 120px;
            display: flex; flex-direction: column; gap: 12px; z-index: 50;
        }

        .float-btn {
            width: 58px; height: 58px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; box-shadow: 0 10px 35px rgba(0,0,0,0.5);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .float-btn:active { transform: scale(0.85); background: var(--accent); }

        #bottom-dock {
            position: fixed; bottom: 24px; left: 16px; right: 16px;
            height: 80px; border-radius: 28px; padding: 10px;
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; z-index: 100;
        }

        #data-drawer {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 75vh; transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 36px 36px 0 0; z-index: 200;
        }
        #data-drawer.open { transform: translateY(0); }

        .drawer-handle {
            width: 48px; height: 6px; background: rgba(255,255,255,0.2);
            border-radius: 3px; margin: 12px auto;
        }

        .sync-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #settings-modal {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95);
            z-index: 3000; display: none; align-items: center; justify-content: center; padding: 24px;
        }
        #settings-modal.active { display: flex; }

        .btn-strava-main {
            background-color: var(--strava);
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-strava-main:active { transform: scale(0.96); opacity: 0.9; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200">

    <div id="map"></div>

    <!-- Status Pill -->
    <div class="fixed top-10 left-1/2 -translate-x-1/2 z-[60]">
        <div id="status-pill" class="glass-panel px-6 py-3 rounded-full flex items-center gap-3 border border-white/10 shadow-2xl transition-all opacity-0 scale-90">
            <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
            <span id="status-text" class="text-[10px] font-black uppercase tracking-[0.25em] text-indigo-50">READY</span>
        </div>
    </div>

    <!-- Floating Map Controls -->
    <div id="map-actions">
        <button onclick="zoomToTrack()" class="float-btn glass-panel" id="btn-fit">
            <i data-lucide="maximize" class="w-6 h-6"></i>
        </button>
        <button onclick="togglePitch()" class="float-btn glass-panel" id="btn-3d">
            <i data-lucide="box" class="w-6 h-6"></i>
        </button>
        <button onclick="resetCamera()" class="float-btn glass-panel">
            <i data-lucide="compass" class="w-6 h-6"></i>
        </button>
        <button onclick="toggleDrawer()" class="float-btn glass-panel border-indigo-500/40">
            <i data-lucide="layout-grid" class="w-6 h-6 text-indigo-400"></i>
        </button>
    </div>

    <!-- Mobile Action Dock -->
    <div id="bottom-dock" class="glass-panel shadow-2xl">
        <div id="strava-unconnected" class="w-full flex gap-3 h-full">
            <button id="btn-strava-connect" onclick="connectStrava()" class="flex-1 btn-strava-main rounded-[20px] flex items-center justify-center gap-3 font-black text-xs uppercase tracking-wider text-white shadow-lg">
                <i data-lucide="log-in" class="w-5 h-5"></i> Connect Strava
            </button>
            <button onclick="toggleSettings()" class="w-[64px] glass-panel rounded-[20px] flex items-center justify-center active:scale-90 transition-transform">
                <i data-lucide="settings" class="w-6 h-6 text-slate-400"></i>
            </button>
        </div>

        <div id="strava-connected" class="hidden w-full flex gap-3 h-full">
            <button id="sync-btn" onclick="fetchLatestStravaActivity()" class="w-[64px] glass-panel rounded-[20px] flex items-center justify-center active:scale-90 transition-transform">
                <i data-lucide="refresh-cw" id="sync-icon" class="w-6 h-6 text-indigo-400"></i>
            </button>
            <button id="flyover-btn" onclick="toggleFlyover()" class="flex-1 bg-indigo-600 rounded-[20px] flex items-center justify-center gap-3 font-black text-xs uppercase tracking-widest text-white shadow-indigo-500/20 shadow-lg">
                <i data-lucide="play" class="w-5 h-5 fill-current"></i> <span id="fly-text">Turbo Cinema</span>
            </button>
        </div>
    </div>

    <!-- Data Drawer -->
    <div id="data-drawer" class="glass-panel border-t border-white/10 p-8 overflow-hidden flex flex-col">
        <div onclick="toggleDrawer()" class="w-full pb-2"><div class="drawer-handle"></div></div>
        
        <div class="flex-1 overflow-y-auto space-y-10 custom-scrollbar pt-4">
            <section>
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-[11px] font-black uppercase text-slate-500 tracking-[0.2em]">Activity Stats</h3>
                    <i data-lucide="activity" class="w-4 h-4 text-slate-600"></i>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-5 bg-white/5 rounded-3xl border border-white/5">
                        <p class="text-[10px] text-slate-500 uppercase font-bold mb-2">Distance</p>
                        <p id="stat-dist" class="text-2xl font-black text-indigo-400 tracking-tight">0.00 <span class="text-xs text-slate-600">km</span></p>
                    </div>
                    <div class="p-5 bg-white/5 rounded-3xl border border-white/5">
                        <p class="text-[10px] text-slate-500 uppercase font-bold mb-2">Elevation</p>
                        <p id="stat-peak" class="text-2xl font-black text-emerald-400 tracking-tight">0 <span class="text-xs text-slate-600">m</span></p>
                    </div>
                </div>
            </section>

            <section>
                <h3 class="text-[11px] font-black uppercase text-slate-500 tracking-[0.2em] mb-6">Import Tools</h3>
                <div class="flex gap-4">
                    <button onclick="document.getElementById('gpx-input').click()" class="flex-1 py-5 bg-slate-800/80 rounded-3xl text-[11px] font-black uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-all">
                        <i data-lucide="map-pin" class="w-4 h-4 text-indigo-400"></i> GPX
                    </button>
                    <button onclick="document.getElementById('photo-input').click()" class="flex-1 py-5 bg-slate-800/80 rounded-3xl text-[11px] font-black uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-all">
                        <i data-lucide="camera" class="w-4 h-4 text-purple-400"></i> Photos
                    </button>
                </div>
                <input type="file" id="gpx-input" class="hidden" accept=".gpx">
                <input type="file" id="photo-input" class="hidden" accept="image/*" multiple>
            </section>

            <div id="photo-grid" class="grid grid-cols-3 gap-3 pb-24"></div>
        </div>
    </div>

    <!-- API Modal -->
    <div id="settings-modal">
        <div class="bg-slate-900 border border-white/10 p-10 rounded-[3rem] w-full max-w-sm space-y-8 shadow-2xl">
            <div class="text-center space-y-2">
                <h3 class="text-2xl font-black tracking-tight">API Setup</h3>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Strava Developer Keys</p>
            </div>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-600 uppercase ml-2">Client ID</label>
                    <input type="text" id="input-client-id" class="w-full bg-black/40 border border-white/5 rounded-2xl px-5 py-4 text-sm outline-none focus:border-indigo-500 transition-colors" placeholder="e.g. 212229">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-600 uppercase ml-2">Client Secret</label>
                    <input type="password" id="input-client-secret" class="w-full bg-black/40 border border-white/5 rounded-2xl px-5 py-4 text-sm outline-none focus:border-indigo-500 transition-colors" placeholder="••••••••••••••••">
                </div>
            </div>
            <div class="space-y-3 pt-2">
                <button onclick="saveApiSettings()" class="w-full py-5 bg-indigo-600 rounded-[20px] font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-600/20 active:scale-95 transition-transform">Initialize App</button>
                <button onclick="toggleSettings()" class="w-full py-2 text-slate-500 text-[10px] font-black uppercase tracking-widest">Close</button>
            </div>
        </div>
    </div>

    <div id="photo-overlay" onclick="this.classList.remove('active')" class="z-[2000] backdrop-blur-2xl transition-all duration-500">
        <div class="relative p-4 flex flex-col items-center gap-6">
            <img id="overlay-img" src="" alt="" class="rounded-[2.5rem] shadow-2xl border-4 border-white/10 max-w-[90vw]">
            <div class="bg-indigo-600 px-8 py-3 rounded-2xl font-black text-[10px] uppercase tracking-[0.3em] shadow-2xl">Capture View</div>
        </div>
    </div>

    <script>
        // --- CONSTANTS ---
        const DEFAULT_CLIENT_ID = '212229';
        const DEFAULT_CLIENT_SECRET = '68086f28b4970e5856fd8f8d32a7b51df738174d';
        const MT_KEY = "MX9HHSfQg4Ieuv8eCGEY";

        let map, currentTrackCoords = [], waypointMarkers = [];
        let isFlyoverActive = false, flyoverRequestId = null, lastTimestamp = 0, flyoverCurrentDist = 0, flyoverBaseSpeed = 230, movieCursorMarker = null;

        // --- CORE UI ---
        function toggleDrawer() { document.getElementById('data-drawer').classList.toggle('open'); }
        function toggleSettings() { 
            const keys = getStoredKeys();
            document.getElementById('input-client-id').value = keys.id;
            document.getElementById('input-client-secret').value = keys.secret;
            document.getElementById('settings-modal').classList.toggle('active'); 
        }
        function showStatus(t) {
            const p = document.getElementById('status-pill');
            const txt = document.getElementById('status-text');
            txt.innerText = t;
            p.classList.remove('opacity-0', 'scale-90');
            p.classList.add('opacity-100', 'scale-100');
            setTimeout(() => {
                p.classList.add('opacity-0', 'scale-90');
                p.classList.remove('opacity-100', 'scale-100');
            }, 3000);
        }

        function getStoredKeys() {
            return {
                id: localStorage.getItem('strava_api_id') || DEFAULT_CLIENT_ID,
                secret: localStorage.getItem('strava_api_secret') || DEFAULT_CLIENT_SECRET
            };
        }

        function saveApiSettings() {
            const id = document.getElementById('input-client-id').value.trim();
            const secret = document.getElementById('input-client-secret').value.trim();
            if(id) localStorage.setItem('strava_api_id', id);
            if(secret) localStorage.setItem('strava_api_secret', secret);
            showStatus("API UPDATED");
            setTimeout(() => window.location.reload(), 800);
        }

        // --- STRAVA AUTH RE-ENGINEERED ---
        function connectStrava() {
            const keys = getStoredKeys();
            const redirectUri = window.location.href.split('?')[0].split('#')[0];
            const url = `https://www.strava.com/oauth/authorize?client_id=${keys.id}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=code&scope=activity:read_all`;
            
            showStatus("REDIRECTING...");
            
            // Create a temporary hidden link to ensure standard browser navigation behavior
            const link = document.createElement('a');
            link.href = url;
            link.target = '_top'; // Critical for iframe breakout
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function handleCallback() {
            const code = new URLSearchParams(window.location.search).get('code');
            if(!code) {
                updateStravaUI(!!localStorage.getItem('strava_access_token'));
                return;
            }
            window.history.replaceState({}, document.title, window.location.pathname);
            showStatus("AUTHORIZING...");
            try {
                const keys = getStoredKeys();
                const res = await fetch('https://www.strava.com/oauth/token', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ client_id: keys.id, client_secret: keys.secret, code, grant_type: 'authorization_code' })
                });
                const data = await res.json();
                if(data.access_token) {
                    localStorage.setItem('strava_access_token', data.access_token);
                    updateStravaUI(true);
                    fetchLatestStravaActivity();
                }
            } catch(e) { showStatus("AUTH FAILED"); }
        }

        function updateStravaUI(connected) {
            document.getElementById('strava-unconnected').classList.toggle('hidden', connected);
            document.getElementById('strava-connected').classList.toggle('hidden', !connected);
        }

        async function fetchLatestStravaActivity() {
            const token = localStorage.getItem('strava_access_token');
            if(!token) return;
            const icon = document.getElementById('sync-icon');
            icon.classList.add('sync-spinner');
            showStatus("FETCHING RUN...");
            
            try {
                const actsRes = await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=1', { headers: { 'Authorization': `Bearer ${token}` } });
                if(actsRes.status === 401) { localStorage.removeItem('strava_access_token'); updateStravaUI(false); return showStatus("SESSION EXPIRED"); }
                
                const activities = await actsRes.json();
                if(!activities.length) return showStatus("NO RUNS FOUND");

                const streamsRes = await fetch(`https://www.strava.com/api/v3/activities/${activities[0].id}/streams?keys=latlng,altitude&key_by_type=true`, { headers: { 'Authorization': `Bearer ${token}` } });
                const streams = await streamsRes.json();

                if(streams.latlng) {
                    processStreams(streams);
                    showStatus("SYNC COMPLETE");
                }
            } catch(e) { showStatus("SYNC ERROR"); }
            finally { icon.classList.remove('sync-spinner'); }
        }

        function processStreams(streams) {
            const latlngs = streams.latlng.data, altitudes = streams.altitude ? streams.altitude.data : new Array(latlngs.length).fill(0);
            waypointMarkers.forEach(m => m.remove()); waypointMarkers = [];
            let total = 0, maxEle = -Infinity;
            currentTrackCoords = latlngs.map((pt, i) => {
                if(altitudes[i] > maxEle) maxEle = altitudes[i];
                if(i > 0) total += calculateDistance(latlngs[i-1][0], latlngs[i-1][1], pt[0], pt[1]);
                return [pt[1], pt[0], altitudes[i], total];
            });
            map.getSource('route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: currentTrackCoords.map(c => [c[0], c[1]]) } });
            addSign(currentTrackCoords[0], '#10b981', 'flag');
            addSign(currentTrackCoords[currentTrackCoords.length-1], '#ef4444', 'trophy');
            document.getElementById('stat-dist').innerHTML = `${(total/1000).toFixed(2)} <span class="text-[10px] text-slate-600 uppercase">km</span>`;
            document.getElementById('stat-peak').innerHTML = `${Math.round(maxEle)} <span class="text-[10px] text-slate-600 uppercase">m</span>`;
            setTimeout(() => zoomToTrack(), 800);
        }

        // --- MAP ENGINE SECURE BOOT ---
        async function secureMapInit() {
            try {
                const safeLocation = { 
                    href: 'https://localhost/', protocol: 'https:', origin: 'https://localhost',
                    host: 'localhost', hostname: 'localhost', pathname: '/', search: '', hash: '', toString: () => 'https://localhost/'
                };
                const globalProxy = new Proxy(window, {
                    get(t, p) {
                        if (p === 'location') return safeLocation;
                        if (p === 'history') return { pushState: () => {}, replaceState: () => {}, state: null };
                        if (['URL', 'Blob', 'Worker', 'File', 'FileReader', 'navigator', 'document'].includes(p)) return window[p];
                        const v = window[p];
                        if (typeof v === 'function' && !p.startsWith('on')) { try { return v.bind(window); } catch(e) { return v; } }
                        return v;
                    }
                });

                const libResponse = await fetch('https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js');
                const libCode = await libResponse.text();
                const bundle = new Function('window', 'self', 'location', 'history', 'globalThis', `${libCode}; return maplibregl;`);
                window.maplibregl = bundle(globalProxy, globalProxy, safeLocation, globalProxy.history, globalProxy);
                
                initMapInstance();
            } catch (e) { initMapInstance(); }
        }

        function initMapInstance() {
            const loader = document.querySelector('#map > div');
            if(loader) loader.remove();

            map = new window.maplibregl.Map({
                container: 'map', style: `https://api.maptiler.com/maps/hybrid/style.json?key=${MT_KEY}`,
                center: [0, 20], zoom: 2, pitch: 0, antialias: true, attributionControl: false,
                refreshExpiredTiles: false, fadeDuration: 0
            });

            map.on('load', () => {
                map.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
                map.addLayer({ id: 'route-glow', type: 'line', source: 'route', paint: { 'line-color': '#4f46e5', 'line-width': 12, 'line-opacity': 0.3 } });
                map.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#818cf8', 'line-width': 4.5 } });
                map.addSource('terrain', { type: 'raster-dem', url: `https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${MT_KEY}`, tileSize: 256 });
                map.setTerrain({ source: 'terrain', exaggeration: 1.6 });
                lucide.createIcons();
                handleCallback();
            });
            window.addEventListener('resize', () => map.resize());
        }

        // --- ULTRA-STABLE MOBILE ZOOM ---
        function zoomToTrack() {
            if(!currentTrackCoords.length || !map) return;
            showStatus("TARGETING...");
            
            // Step 1: Physical resize
            map.resize();
            
            const bounds = new window.maplibregl.LngLatBounds();
            currentTrackCoords.forEach(c => bounds.extend([c[0], c[1]]));

            // Step 2: Multi-stage delay for mobile browsers
            setTimeout(() => {
                map.resize();
                try {
                    map.fitBounds(bounds, { 
                        padding: {top: 80, bottom: 160, left: 40, right: 40}, 
                        pitch: 45, duration: 3000, essential: true 
                    });
                } catch(e) {
                    map.flyTo({ center: [currentTrackCoords[0][0], currentTrackCoords[0][1]], zoom: 15, duration: 2000 });
                }
            }, 250);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3, φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180, Δφ = (lat2-lat1)*Math.PI/180, Δλ = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function resetCamera() { map.easeTo({ center: currentTrackCoords.length ? [currentTrackCoords[0][0], currentTrackCoords[0][1]] : [0,0], bearing: 0, pitch: 0, duration: 1500 }); }
        function togglePitch() { map.easeTo({ pitch: map.getPitch() > 10 ? 0 : 70, duration: 1000 }); }
        function addSign(pt, color, icon) {
            const el = document.createElement('div'); el.className = 'sign-marker'; el.style.backgroundColor = color;
            el.innerHTML = `<i data-lucide="${icon}" class="text-white w-4 h-4"></i>`;
            waypointMarkers.push(new window.maplibregl.Marker({ element: el }).setLngLat([pt[0], pt[1]]).addTo(map));
            lucide.createIcons();
        }

        // Cinematic 
        function toggleFlyover() { isFlyoverActive ? stopFlyover() : startFlyover(); }
        function startFlyover() {
            if(!currentTrackCoords.length) return showStatus("NO PATH");
            isFlyoverActive = true; flyoverCurrentDist = 0; lastTimestamp = performance.now();
            document.getElementById('fly-text').innerText = "STOP";
            const el = document.createElement('div'); el.className = 'movie-cursor';
            movieCursorMarker = new window.maplibregl.Marker({ element: el }).setLngLat([currentTrackCoords[0][0], currentTrackCoords[0][1]]).addTo(map);
            flyoverRequestId = requestAnimationFrame(flyoverLoop);
        }
        function stopFlyover() {
            isFlyoverActive = false; cancelAnimationFrame(flyoverRequestId);
            if(movieCursorMarker) { movieCursorMarker.remove(); movieCursorMarker = null; }
            document.getElementById('fly-text').innerText = "TURBO CINEMA";
        }
        function flyoverLoop(timestamp) {
            if(!isFlyoverActive || !map) return;
            const delta = (timestamp - lastTimestamp) / 1000; lastTimestamp = timestamp;
            flyoverCurrentDist += flyoverBaseSpeed * delta;
            if(flyoverCurrentDist >= currentTrackCoords[currentTrackCoords.length-1][3]) return stopFlyover();
            const pos = getPointAtDist(flyoverCurrentDist);
            const next = getPointAtDist(flyoverCurrentDist + 40);
            const bear = calculateBearing(pos[1], pos[0], next[1], next[0]);
            movieCursorMarker.setLngLat([pos[0], pos[1]]);
            map.jumpTo({ center: [pos[0], pos[1]], bearing: bear, pitch: 75, zoom: 18 });
            flyoverRequestId = requestAnimationFrame(flyoverLoop);
        }
        function getPointAtDist(d) {
            for(let i=0; i<currentTrackCoords.length-1; i++) {
                const p1 = currentTrackCoords[i], p2 = currentTrackCoords[i+1];
                if(d >= p1[3] && d <= p2[3]) {
                    const r = (d-p1[3])/(p2[3]-p1[3]);
                    return [p1[0]+(p2[0]-p1[0])*r, p1[1]+(p2[1]-p1[1])*r];
                }
            }
            return [currentTrackCoords[0][0], currentTrackCoords[0][1]];
        }
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const φ1 = lat1*Math.PI/180, φ2 = lat2*Math.PI/180, Δλ = (lon2-lon1)*Math.PI/180;
            return (Math.atan2(Math.sin(Δλ)*Math.cos(φ2), Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ))*180/Math.PI+360)%360;
        }

        // Local Uploads
        document.getElementById('gpx-input').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const xml = (new DOMParser()).parseFromString(ev.target.result, "text/xml");
                const pts = Array.from(xml.getElementsByTagName("trkpt")).map(p => ({ lat: parseFloat(p.getAttribute("lat")), lon: parseFloat(p.getAttribute("lon")), ele: p.getElementsByTagName("ele")[0] ? parseFloat(p.getElementsByTagName("ele")[0].textContent) : 0 }));
                if (!pts.length) return showStatus("EMPTY GPX");
                waypointMarkers.forEach(m => m.remove()); waypointMarkers = [];
                let total = 0, maxEle = -Infinity;
                currentTrackCoords = pts.map((p, i) => { if (p.ele > maxEle) maxEle = p.ele; if (i > 0) total += calculateDistance(pts[i-1].lat, pts[i-1].lon, p.lat, p.lon); return [p.lon, p.lat, p.ele, total]; });
                map.getSource('route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: currentTrackCoords.map(c => [c[0], c[1]]) } });
                addSign(currentTrackCoords[0], '#10b981', 'flag'); addSign(currentTrackCoords[currentTrackCoords.length-1], '#ef4444', 'trophy');
                document.getElementById('stat-dist').innerHTML = `${(total/1000).toFixed(2)} <span class="text-xs">km</span>`;
                document.getElementById('stat-peak').innerHTML = `${Math.round(maxEle)} <span class="text-xs">m</span>`;
                setTimeout(() => zoomToTrack(), 600);
            };
            reader.readAsText(e.target.files[0]);
        });

        document.getElementById('photo-input').addEventListener('change', async (e) => {
            const grid = document.getElementById('photo-grid');
            for (const file of e.target.files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    EXIF.getData(file, function() {
                        const lat = EXIF.getTag(this, "GPSLatitude"), lon = EXIF.getTag(this, "GPSLongitude");
                        if (lat && lon) {
                            const dLat = (lat[0] + lat[1]/60 + lat[2]/3600) * (EXIF.getTag(this, "GPSLatitudeRef") === "S" ? -1 : 1);
                            const dLon = (lon[0] + lon[1]/60 + lat[2]/3600) * (EXIF.getTag(this, "GPSLongitudeRef") === "W" ? -1 : 1);
                            const el = document.createElement('div'); el.className = 'photo-marker shadow-2xl'; el.style.backgroundImage = `url(${ev.target.result})`;
                            el.onclick = () => { document.getElementById('overlay-img').src = ev.target.result; document.getElementById('photo-overlay').classList.add('active'); };
                            new window.maplibregl.Marker({ element: el }).setLngLat([dLon, dLat]).addTo(map);
                            const card = document.createElement('div'); card.className = 'aspect-square rounded-2xl overflow-hidden border border-white/10 shadow-lg';
                            card.innerHTML = `<img src="${ev.target.result}" class="w-full h-full object-cover">`;
                            grid.appendChild(card);
                        }
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        window.onload = secureMapInit;
    </script>
</body>
</html>
