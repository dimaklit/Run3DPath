<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Run3D Mobile - V11.9 Clean Vision</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap');

        :root { --accent: #6366f1; --strava: #FC4C02; --bg: #020617; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); font-family: 'Inter', sans-serif; touch-action: manipulation; }
        
        #map { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; background: #0f172a; }

        .ui-layer { z-index: 9999 !important; pointer-events: auto; }

        .glass-ui {
            background: rgba(15, 23, 42, 0.96) !important;
            backdrop-filter: blur(30px) !important;
            -webkit-backdrop-filter: blur(30px) !important;
            border: 1.5px solid rgba(255, 255, 255, 0.15) !important;
            box-shadow: 0 15px 45px rgba(0,0,0,0.8) !important;
        }

        #top-header {
            position: fixed; top: calc(12px + env(safe-area-inset-top, 0px)); left: 16px; right: 16px;
            height: 72px; border-radius: 26px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }

        #hud-controls {
            position: fixed; right: 16px; bottom: 155px;
            display: flex; flex-direction: column; gap: 16px;
        }

        .hud-btn {
            width: 64px; height: 64px; border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            color: white; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
            background: rgba(30, 41, 59, 1);
            border: 2px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 35px rgba(0,0,0,0.6);
        }
        .hud-btn:active { transform: scale(0.85); background: var(--accent); }

        #main-dock {
            position: fixed; bottom: calc(24px + env(safe-area-inset-bottom, 0px)); 
            left: 16px; right: 16px; height: 96px; 
            border-radius: 34px; padding: 14px;
            display: flex; gap: 12px; align-items: center;
        }

        .dock-btn {
            height: 100%; border-radius: 24px; display: flex; 
            align-items: center; justify-content: center; transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .strava-btn { background: var(--strava); color: white; font-weight: 900; box-shadow: 0 8px 30px rgba(252, 76, 2, 0.4); }
        .cinema-btn { background: var(--accent); color: white; font-weight: 900; box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4); }
        .settings-btn { background: rgba(255,255,255,0.1); color: #fff; border: 1.5px solid rgba(255,255,255,0.1); width: 72px; }
        .sync-btn-small { background: rgba(99, 102, 241, 0.2); color: #fff; border: 1.5px solid #818cf8; width: 72px; }

        /* Clean Waypoints */
        .waypoint-container {
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
        }
        .waypoint-container.popup { transform: scale(1.6) translateY(-5px); z-index: 1000; }
        
        .waypoint-icon {
            width: 32px; height: 32px; border-radius: 10px; border: 2.5px solid white;
            display: flex; align-items: center; justify-content: center;
        }
        .waypoint-label {
            margin-top: 6px; padding: 3px 10px; border-radius: 6px;
            background: rgba(0,0,0,0.85); border: 1px solid #fff;
            color: white; font-size: 8px; font-weight: 900; text-transform: uppercase;
        }

        #asset-drawer {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 78vh; transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 48px 48px 0 0; z-index: 100000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        #asset-drawer.open { transform: translateY(0); }

        .handle-bar {
            width: 52px; height: 7px; background: rgba(255,255,255,0.25);
            border-radius: 12px; margin: 0 auto 20px;
        }

        .spinning { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #settings-overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.99);
            z-index: 200000; display: none; align-items: center; justify-content: center; padding: 30px;
        }
        #settings-overlay.active { display: flex; }
    </style>
</head>
<body class="text-slate-100">

    <div id="map"></div>

    <header id="top-header" class="glass-ui ui-layer">
        <div class="flex items-center gap-4">
            <div class="bg-indigo-600 p-2.5 rounded-2xl shadow-lg">
                <i data-lucide="mountain" class="w-6 h-6 text-white"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tighter leading-none text-white flex items-center gap-2">
                    Run3D Path <span class="bg-indigo-500/40 border border-white/20 text-[10px] px-2.5 py-0.5 rounded-full">v11.9</span>
                </h1>
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-1" id="engine-status">IDLE</p>
            </div>
        </div>
        <div class="flex items-center gap-2 bg-black/50 px-4 py-2.5 rounded-full border border-white/10">
            <div id="live-dot" class="w-2 h-2 rounded-full bg-emerald-500"></div>
            <span class="text-[10px] font-black text-white uppercase tracking-widest" id="status-pill-text">LIVE</span>
        </div>
    </header>

    <div id="hud-controls" class="ui-layer">
        <button onclick="zoomToTrack()" class="hud-btn" id="mobile-fit-btn" title="Fit View">
            <i data-lucide="maximize" class="w-9 h-9"></i>
        </button>
        <button onclick="togglePitch()" class="hud-btn" title="3D View">
            <i data-lucide="box" class="w-9 h-9"></i>
        </button>
        <button onclick="resetCamera()" class="hud-btn" title="Reset North">
            <i data-lucide="compass" class="w-9 h-9"></i>
        </button>
        <button onclick="toggleDrawer()" class="hud-btn border-indigo-500/50" title="Import Files">
            <i data-lucide="plus-circle" class="w-9 h-9 text-indigo-400"></i>
        </button>
    </div>

    <div id="main-dock" class="glass-ui ui-layer">
        <button id="btn-strava-connect" onclick="connectStrava()" class="dock-btn strava-btn flex-1 gap-3 uppercase text-[11px] tracking-widest">
            <i data-lucide="zap" class="w-6 h-6 fill-white"></i> Connect Strava
        </button>

        <button id="flyover-btn" onclick="toggleFlyover()" class="dock-btn cinema-btn flex-1 gap-3 uppercase text-[11px] tracking-widest" style="display: none !important;">
            <i data-lucide="play-circle" class="w-7 h-7 fill-current"></i> <span id="fly-text">TURBO CINEMA</span>
        </button>

        <button id="sync-btn-small" onclick="fetchLatestStravaActivity()" class="dock-btn sync-btn-small" style="display: none !important;">
            <i data-lucide="refresh-cw" id="sync-icon" class="w-8 h-8"></i>
        </button>

        <button onclick="toggleSettings()" class="dock-btn settings-btn">
            <i data-lucide="settings" class="w-8 h-8"></i>
        </button>
    </div>

    <div id="asset-drawer" class="glass-ui p-8 overflow-hidden flex flex-col shadow-[0_-50px_100px_rgba(0,0,0,1)]">
        <div onclick="toggleDrawer()" class="w-full pb-4"><div class="handle-bar"></div></div>
        <div class="flex-1 overflow-y-auto space-y-12 pt-4">
            <section>
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-[14px] font-black uppercase text-slate-400 tracking-[0.4em]">Activity Stats</h3>
                    <i data-lucide="activity" class="w-6 h-6 text-indigo-500"></i>
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div class="p-8 bg-white/5 rounded-[40px] border border-white/5 shadow-inner">
                        <p class="text-[11px] text-slate-600 uppercase font-black mb-3">Distance</p>
                        <p id="stat-dist" class="text-4xl font-black text-indigo-400 tracking-tighter">0.00 <span class="text-sm">KM</span></p>
                    </div>
                    <div class="p-8 bg-white/5 rounded-[40px] border border-white/5 shadow-inner">
                        <p class="text-[11px] text-slate-600 uppercase font-black mb-3">Peak</p>
                        <p id="stat-peak" class="text-4xl font-black text-emerald-400 tracking-tighter">0 <span class="text-sm">M</span></p>
                    </div>
                </div>
            </section>
            <section>
                <h3 class="text-[14px] font-black uppercase text-slate-400 tracking-[0.4em] mb-8">File Center</h3>
                <div class="flex gap-6">
                    <button onclick="document.getElementById('gpx-input').click()" class="flex-1 py-8 bg-slate-800 rounded-[32px] text-[12px] font-black uppercase tracking-widest flex items-center justify-center gap-4 active:scale-95 transition-all">
                        <i data-lucide="upload" class="w-7 h-7 text-indigo-400"></i> GPX
                    </button>
                    <button onclick="document.getElementById('photo-input').click()" class="flex-1 py-8 bg-slate-800 rounded-[32px] text-[12px] font-black uppercase tracking-widest flex items-center justify-center gap-4 active:scale-95 transition-all">
                        <i data-lucide="image" class="w-7 h-7 text-purple-400"></i> PHOTOS
                    </button>
                </div>
                <input type="file" id="gpx-input" class="hidden" accept=".gpx">
                <input type="file" id="photo-input" class="hidden" accept="image/*" multiple>
            </section>
            <div id="photo-grid" class="grid grid-cols-3 gap-5 pb-48"></div>
        </div>
    </div>

    <div id="settings-overlay">
        <div class="glass-ui p-12 rounded-[4rem] w-full max-w-sm space-y-10 border-indigo-500/20 border-2">
            <h3 class="text-3xl font-black tracking-tighter text-white text-center">API CONFIG</h3>
            <div class="space-y-6">
                <input type="text" id="input-client-id" class="w-full bg-black/80 border border-white/10 rounded-[24px] px-6 py-6 text-sm outline-none focus:border-indigo-500" placeholder="Client ID">
                <input type="password" id="input-client-secret" class="w-full bg-black/80 border border-white/10 rounded-[24px] px-6 py-6 text-sm outline-none focus:border-indigo-500" placeholder="Secret Key">
            </div>
            <div class="flex flex-col gap-4">
                <button onclick="saveApiSettings()" class="w-full py-6 bg-indigo-600 rounded-[24px] font-black text-xs uppercase tracking-widest shadow-2xl">Update Core</button>
                <button id="logout-btn" onclick="disconnectStrava()" class="w-full py-4 bg-red-500/10 border border-red-500/30 text-red-500 rounded-[20px] font-black text-[10px] uppercase">Sign Out</button>
                <button onclick="toggleSettings()" class="w-full py-2 text-slate-500 text-[11px] font-black uppercase">Dismiss</button>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID_DEF = '212229';
        const CLIENT_SEC_DEF = '68086f28b4970e5856fd8f8d32a7b51df738174d';
        const MT_KEY = "MX9HHSfQg4Ieuv8eCGEY";

        // Precision Scaling: Only slight adjustment for High-DPI to prevent "noisy shoulders"
        const DPR = window.devicePixelRatio || 1;
        const MOBILE_FACTOR = DPR > 1.5 ? 1.25 : 1.0; 

        let map, currentTrackCoords = [], waypointMarkers = [];
        let isFlyoverActive = false, flyoverRequestId = null, lastTimestamp = 0, flyoverCurrentDist = 0, flyoverBaseSpeed = 230, movieCursorMarker = null;

        function toggleDrawer() { document.getElementById('asset-drawer').classList.toggle('open'); }
        function toggleSettings() { 
            const keys = getKeys();
            document.getElementById('input-client-id').value = keys.id;
            document.getElementById('input-client-secret').value = keys.secret;
            document.getElementById('logout-btn').style.display = localStorage.getItem('strava_access_token') ? 'block' : 'none';
            document.getElementById('settings-overlay').classList.toggle('active'); 
        }

        function updateUIMessage(msg, active = true) {
            document.getElementById('engine-status').innerText = msg;
            const dot = document.getElementById('live-dot');
            if (active) dot.className = "w-2 h-2 rounded-full bg-yellow-500 animate-pulse";
            else { dot.className = "w-2 h-2 rounded-full bg-emerald-500"; document.getElementById('engine-status').innerText = "CLEAN ENGINE"; }
        }

        function getKeys() { return { id: localStorage.getItem('strava_api_id') || CLIENT_ID_DEF, secret: localStorage.getItem('strava_api_secret') || CLIENT_SEC_DEF }; }
        function saveApiSettings() { const id = document.getElementById('input-client-id').value.trim(); const secret = document.getElementById('input-client-secret').value.trim(); if(id) localStorage.setItem('strava_api_id', id); if(secret) localStorage.setItem('strava_api_secret', secret); window.location.reload(); }

        function updateStravaUI(connected) {
            const connectBtn = document.getElementById('btn-strava-connect');
            const cinemaBtn = document.getElementById('flyover-btn');
            const syncBtn = document.getElementById('sync-btn-small');
            if (connected) { connectBtn.style.setProperty('display', 'none', 'important'); cinemaBtn.style.setProperty('display', 'flex', 'important'); syncBtn.style.setProperty('display', 'flex', 'important'); }
            else { connectBtn.style.setProperty('display', 'flex', 'important'); cinemaBtn.style.setProperty('display', 'none', 'important'); syncBtn.style.setProperty('display', 'none', 'important'); }
        }

        function connectStrava() {
            const keys = getKeys();
            const cleanUrl = window.location.origin + window.location.pathname;
            const url = `https://www.strava.com/oauth/authorize?client_id=${keys.id}&redirect_uri=${encodeURIComponent(cleanUrl)}&response_type=code&scope=activity:read_all`;
            updateUIMessage("CONNECTING...");
            window.location.assign(url);
        }

        function disconnectStrava() { localStorage.removeItem('strava_access_token'); window.location.reload(); }

        async function initAuth() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if(!code) { updateStravaUI(!!localStorage.getItem('strava_access_token')); return; }
            window.history.replaceState({}, document.title, window.location.pathname);
            updateUIMessage("HANDSHAKE...");
            try {
                const keys = getKeys();
                const res = await fetch('https://www.strava.com/oauth/token', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ client_id: keys.id, client_secret: keys.secret, code: code, grant_type: 'authorization_code' }) });
                const data = await res.json();
                if(data.access_token) { localStorage.setItem('strava_access_token', data.access_token); updateStravaUI(true); fetchLatestStravaActivity(); }
            } catch(e) { updateUIMessage("AUTH ERROR"); }
        }

        async function fetchLatestStravaActivity() {
            const token = localStorage.getItem('strava_access_token');
            if(!token) return;
            const icon = document.getElementById('sync-icon'); if(icon) icon.classList.add('spinning');
            updateUIMessage("FETCHING...");
            try {
                const actsRes = await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=1', { headers: { 'Authorization': `Bearer ${token}` } });
                const activities = await actsRes.json();
                if(!activities || activities.length === 0) { updateUIMessage("NO RUNS", false); return; }
                const streamsRes = await fetch(`https://www.strava.com/api/v3/activities/${activities[0].id}/streams?keys=latlng,altitude&key_by_type=true`, { headers: { 'Authorization': `Bearer ${token}` } });
                const streams = await streamsRes.json();
                if(streams.latlng) processStreams(streams);
            } catch(e) { updateUIMessage("STRAVA ERR"); } finally { if(icon) icon.classList.remove('spinning'); }
        }

        function processStreams(streams) {
            const latlngs = streams.latlng.data, altitudes = streams.altitude ? streams.altitude.data : new Array(latlngs.length).fill(0);
            waypointMarkers.forEach(w => w.marker.remove()); waypointMarkers = [];
            let total = 0, maxEle = -Infinity, maxEleIdx = 0;
            currentTrackCoords = latlngs.map((pt, i) => {
                if(altitudes[i] > maxEle) { maxEle = altitudes[i]; maxEleIdx = i; }
                if(i > 0) total += calculateDistance(latlngs[i-1][0], latlngs[i-1][1], pt[0], pt[1]);
                return [pt[1], pt[0], altitudes[i], total];
            });
            if(map && map.getSource('route')) {
                map.getSource('route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: currentTrackCoords.map(c => [c[0], c[1]]) } });
                addSign(currentTrackCoords[0], '#10b981', 'flag', 'START');
                addSign(currentTrackCoords[currentTrackCoords.length-1], '#ef4444', 'trophy', 'FINISH');
                addSign(currentTrackCoords[maxEleIdx], '#a855f7', 'mountain', 'PEAK');
                document.getElementById('stat-dist').innerHTML = `${(total/1000).toFixed(2)} <span class="text-sm">KM</span>`;
                document.getElementById('stat-peak').innerHTML = `${Math.round(maxEle)} <span class="text-sm">M</span>`;
                setTimeout(() => zoomToTrack(), 1000);
            }
            updateUIMessage("READY", false);
        }

        async function secureMapInit() {
            try {
                const safeLocation = { href: 'https://localhost/', protocol: 'https:', origin: 'https://localhost', host: 'localhost', hostname: 'localhost', pathname: '/', search: '', hash: '', toString: () => 'https://localhost/' };
                const globalProxy = new Proxy(window, { get(t, p) { if (p === 'location') return safeLocation; if (p === 'history') return { pushState: () => {}, replaceState: () => {}, state: null }; if (['URL', 'Blob', 'Worker', 'File', 'FileReader', 'navigator', 'document'].includes(p)) return window[p]; const v = window[p]; if (typeof v === 'function' && !p.startsWith('on')) { try { return v.bind(window); } catch(e) { return v; } } return v; } });
                const libRes = await fetch('https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js');
                const libCode = await libRes.text();
                const bundle = new Function('window', 'self', 'location', 'history', 'globalThis', `${libCode}; return maplibregl;`);
                window.maplibregl = bundle(globalProxy, globalProxy, safeLocation, globalProxy.history, globalProxy);
                initMap();
            } catch (e) { initMap(); }
        }

        function initMap() {
            window.addEventListener('error', (e) => { if (e.message.includes('clearFadeHold')) e.stopImmediatePropagation(); });
            map = new window.maplibregl.Map({
                container: 'map', style: `https://api.maptiler.com/maps/hybrid/style.json?key=${MT_KEY}`,
                center: [0, 20], zoom: 2, pitch: 0, antialias: true, attributionControl: false, fadeDuration: 0, pixelRatio: DPR 
            });

            map.on('load', () => {
                map.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
                
                // --- V11.9 PRECISION CLEAN TRACE ---
                // Subtle Glow (No noise)
                map.addLayer({ id: 'route-glow', type: 'line', source: 'route', 
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: { 
                        'line-color': '#4f46e5', 
                        'line-width': ['interpolate', ['linear'], ['zoom'], 4, 12 * MOBILE_FACTOR, 12, 35 * MOBILE_FACTOR, 18, 90 * MOBILE_FACTOR], 
                        'line-opacity': 0.35, 'line-blur': ['interpolate', ['linear'], ['zoom'], 10, 4, 18, 12]
                    }
                });
                // Saturated Main Body
                map.addLayer({ id: 'route-neon', type: 'line', source: 'route', 
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: { 
                        'line-color': '#6366f1', 
                        'line-width': ['interpolate', ['linear'], ['zoom'], 4, 6 * MOBILE_FACTOR, 12, 14 * MOBILE_FACTOR, 18, 35 * MOBILE_FACTOR],
                        'line-opacity': 0.95
                    }
                });
                // Ultra Sharp White Core
                map.addLayer({ id: 'route-white', type: 'line', source: 'route', 
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: { 
                        'line-color': '#ffffff', 
                        'line-width': ['interpolate', ['linear'], ['zoom'], 4, 2 * MOBILE_FACTOR, 12, 4 * MOBILE_FACTOR, 18, 10 * MOBILE_FACTOR],
                        'line-opacity': 1.0
                    }
                });

                map.addSource('terrain', { type: 'raster-dem', url: `https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${MT_KEY}`, tileSize: 256 });
                map.setTerrain({ source: 'terrain', exaggeration: 1.8 });
                
                updateUIMessage("READY", false);
                lucide.createIcons();
                initAuth();
            });
            window.addEventListener('resize', () => map.resize());
        }

        function zoomToTrack() {
            if(!currentTrackCoords.length || !map) return;
            map.resize();
            const bounds = new window.maplibregl.LngLatBounds();
            currentTrackCoords.forEach(c => bounds.extend([c[0], c[1]]));
            setTimeout(() => {
                map.resize();
                try { map.fitBounds(bounds, { padding: {top: 140, bottom: 240, left: 80, right: 80}, pitch: 45, duration: 3000, essential: true }); } 
                catch(e) { map.flyTo({ center: [currentTrackCoords[0][0], currentTrackCoords[0][1]], zoom: 15.0, duration: 2500 }); }
            }, 400);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const φ1 = lat1 * Math.PI/180; const φ2 = lat2 * Math.PI/180; const Δφ = (lat2-lat1)*Math.PI/180; const Δλ = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function resetCamera() { map.easeTo({ center: currentTrackCoords.length ? [currentTrackCoords[0][0], currentTrackCoords[0][1]] : [0,0], bearing: 0, pitch: 0, duration: 1500 }); }
        function togglePitch() { map.easeTo({ pitch: map.getPitch() > 10 ? 0 : 75, duration: 1000 }); }
        
        function addSign(pt, color, icon, label) {
            const el = document.createElement('div'); el.className = 'waypoint-container';
            el.innerHTML = `<div class="waypoint-icon" style="background: ${color}"><i data-lucide="${icon}" class="text-white w-5 h-5"></i></div><div class="waypoint-label">${label}</div>`;
            const marker = new window.maplibregl.Marker({ element: el, anchor: 'bottom' }).setLngLat([pt[0], pt[1]]).addTo(map);
            waypointMarkers.push({ marker, element: el, coords: [pt[0], pt[1]] });
            lucide.createIcons();
        }

        function toggleFlyover() { isFlyoverActive ? stopFlyover() : startFlyover(); }
        function startFlyover() {
            if(!currentTrackCoords.length) return;
            isFlyoverActive = true; flyoverCurrentDist = 0; lastTimestamp = performance.now();
            document.getElementById('fly-text').innerText = "STOP MISSION";
            const el = document.createElement('div'); el.className = 'w-10 h-10 bg-white border-[8px] border-indigo-500 rounded-full shadow-[0_0_40px_#6366f1]';
            movieCursorMarker = new window.maplibregl.Marker({ element: el }).setLngLat([currentTrackCoords[0][0], currentTrackCoords[0][1]]).addTo(map);
            flyoverRequestId = requestAnimationFrame(flyoverLoop);
        }
        function stopFlyover() { isFlyoverActive = false; cancelAnimationFrame(flyoverRequestId); if(movieCursorMarker) { movieCursorMarker.remove(); movieCursorMarker = null; } document.getElementById('fly-text').innerText = "TURBO CINEMA"; waypointMarkers.forEach(w => w.element.classList.remove('popup')); }
        
        function flyoverLoop(timestamp) {
            if(!isFlyoverActive || !map) return;
            const delta = (timestamp - lastTimestamp) / 1000; lastTimestamp = timestamp;
            flyoverCurrentDist += flyoverBaseSpeed * delta;
            const totalD = currentTrackCoords[currentTrackCoords.length-1][3];
            if(flyoverCurrentDist >= totalD) return stopFlyover();
            const pos = getPointAtDist(flyoverCurrentDist);
            const next = getPointAtDist(flyoverCurrentDist + 80); 
            waypointMarkers.forEach(w => {
                const dist = calculateDistance(pos[1], pos[0], w.coords[1], w.coords[0]);
                if (dist < 100) w.element.classList.add('popup');
                else if (dist > 200) w.element.classList.remove('popup');
            });
            const bear = (Math.atan2(Math.sin((next[0]-pos[0])*Math.PI/180)*Math.cos(next[1]*Math.PI/180), Math.cos(pos[1]*Math.PI/180)*Math.sin(next[1]*Math.PI/180)-Math.sin(pos[1]*Math.PI/180)*Math.cos(next[1]*Math.PI/180)*Math.cos((next[0]-pos[0])*Math.PI/180))*180/Math.PI+360)%360;
            movieCursorMarker.setLngLat([pos[0], pos[1]]);
            map.jumpTo({ center: [pos[0], pos[1]], bearing: bear, pitch: 55, zoom: 15.2 }); 
            flyoverRequestId = requestAnimationFrame(flyoverLoop);
        }

        function getPointAtDist(d) {
            for(let i=0; i<currentTrackCoords.length-1; i++) {
                const p1 = currentTrackCoords[i], p2 = currentTrackCoords[i+1];
                if(d >= p1[3] && d <= p2[3]) { const r = (d-p1[3])/(p2[3]-p1[3]); return [p1[0]+(p2[0]-p1[0])*r, p1[1]+(p2[1]-p1[1])*r]; }
            }
            return [currentTrackCoords[0][0], currentTrackCoords[0][1]];
        }

        window.onload = () => { 
            initAuth(); 
            lucide.createIcons(); 
            secureMapInit(); 
            setTimeout(() => lucide.createIcons(), 1500);
        };
    </script>
