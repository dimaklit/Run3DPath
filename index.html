<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Run3D Mobile - V13.0 Solid Core</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap');

        :root { --accent: #facc15; --strava: #FC4C02; --bg: #020617; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); font-family: 'Inter', sans-serif; touch-action: manipulation; }
        
        #map { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; background: #0f172a; }

        .ui-layer { z-index: 9999 !important; pointer-events: auto; }

        .glass-ui {
            background: rgba(15, 23, 42, 0.92) !important;
            backdrop-filter: blur(25px) !important;
            -webkit-backdrop-filter: blur(25px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7) !important;
        }

        #top-header {
            position: fixed; top: calc(12px + env(safe-area-inset-top, 0px)); left: 16px; right: 16px;
            height: 64px; border-radius: 20px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px;
        }

        #hud-controls {
            position: fixed; right: 16px; bottom: 140px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .hud-btn {
            width: 56px; height: 56px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            color: white; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
            background: rgba(30, 41, 59, 1);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .hud-btn:active { transform: scale(0.9); background: var(--accent); color: #000; }

        #main-dock {
            position: fixed; bottom: calc(20px + env(safe-area-inset-bottom, 0px)); 
            left: 16px; right: 16px; height: 84px; 
            border-radius: 28px; padding: 12px;
            display: flex; gap: 10px; align-items: center;
        }

        .dock-btn {
            height: 100%; border-radius: 20px; display: flex; 
            align-items: center; justify-content: center; transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .strava-btn { background: var(--strava); color: white; font-weight: 800; box-shadow: 0 8px 20px rgba(252, 76, 2, 0.3); }
        .cinema-btn { background: #fff; color: #000; font-weight: 800; box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2); }
        .settings-btn { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.1); width: 64px; }
        .sync-btn-small { background: rgba(250, 204, 21, 0.1); color: var(--accent); border: 1.5px solid var(--accent); width: 64px; }

        .waypoint-container {
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .waypoint-container.popup { transform: scale(1.4) translateY(-8px); z-index: 1000; }
        
        .waypoint-icon {
            width: 28px; height: 28px; border-radius: 8px; border: 2px solid white;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .waypoint-label {
            margin-top: 4px; padding: 2px 8px; border-radius: 4px;
            background: #000; border: 1px solid rgba(255,255,255,0.3);
            color: white; font-size: 9px; font-weight: 800; text-transform: uppercase;
        }

        #asset-drawer {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 75vh; transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 32px 32px 0 0; z-index: 100000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        #asset-drawer.open { transform: translateY(0); }

        .handle-bar {
            width: 40px; height: 5px; background: rgba(255,255,255,0.3);
            border-radius: 10px; margin: 0 auto 15px;
        }

        .spinning { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #settings-overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98);
            z-index: 200000; display: none; align-items: center; justify-content: center; padding: 24px;
        }
        #settings-overlay.active { display: flex; }
    </style>
</head>
<body class="text-slate-100">

    <div id="map"></div>

    <header id="top-header" class="glass-ui ui-layer">
        <div class="flex items-center gap-3">
            <div class="bg-yellow-500 p-2 rounded-xl shadow-lg">
                <i data-lucide="map" class="w-5 h-5 text-black"></i>
            </div>
            <div>
                <h1 class="text-sm font-black tracking-tighter leading-none text-white flex items-center gap-2">
                    RUN3D <span class="bg-white/10 border border-white/10 text-[9px] px-2 py-0.5 rounded-full">V13</span>
                </h1>
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mt-1" id="engine-status">IDLE</p>
            </div>
        </div>
        <div class="flex items-center gap-2 bg-black/40 px-3 py-1.5 rounded-full border border-white/5">
            <div id="live-dot" class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
            <span class="text-[9px] font-black text-white uppercase tracking-widest" id="status-pill-text">LIVE</span>
        </div>
    </header>

    <div id="hud-controls" class="ui-layer">
        <button onclick="zoomToTrack()" class="hud-btn" id="mobile-fit-btn">
            <i data-lucide="maximize" class="w-7 h-7"></i>
        </button>
        <button onclick="togglePitch()" class="hud-btn">
            <i data-lucide="layers" class="w-7 h-7"></i>
        </button>
        <button onclick="resetCamera()" class="hud-btn">
            <i data-lucide="navigation" class="w-7 h-7"></i>
        </button>
        <button onclick="toggleDrawer()" class="hud-btn border-yellow-500/30">
            <i data-lucide="plus" class="w-7 h-7 text-yellow-400"></i>
        </button>
    </div>

    <div id="main-dock" class="glass-ui ui-layer">
        <button id="btn-strava-connect" onclick="connectStrava()" class="dock-btn strava-btn flex-1 gap-2 uppercase text-[10px] tracking-widest">
            <i data-lucide="zap" class="w-5 h-5 fill-white"></i> Connect Strava
        </button>

        <button id="flyover-btn" onclick="toggleFlyover()" class="dock-btn cinema-btn flex-1 gap-2 uppercase text-[10px] tracking-widest" style="display: none !important;">
            <i data-lucide="play" class="w-5 h-5 fill-current"></i> <span id="fly-text">REPLAY</span>
        </button>

        <button id="sync-btn-small" onclick="fetchLatestStravaActivity()" class="dock-btn sync-btn-small" style="display: none !important;">
            <i data-lucide="refresh-ccw" id="sync-icon" class="w-6 h-6"></i>
        </button>

        <button onclick="toggleSettings()" class="dock-btn settings-btn">
            <i data-lucide="settings-2" class="w-7 h-7"></i>
        </button>
    </div>

    <div id="asset-drawer" class="glass-ui p-6 overflow-hidden flex flex-col">
        <div onclick="toggleDrawer()" class="w-full pb-2"><div class="handle-bar"></div></div>
        <div class="flex-1 overflow-y-auto space-y-8 pt-2">
            <section>
                <h3 class="text-[11px] font-black uppercase text-slate-500 tracking-[0.3em] mb-4">Activity Stats</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-5 bg-white/5 rounded-3xl border border-white/5">
                        <p class="text-[9px] text-slate-500 uppercase font-black mb-1">Distance</p>
                        <p id="stat-dist" class="text-2xl font-black text-white">0.00 <span class="text-xs text-slate-400">KM</span></p>
                    </div>
                    <div class="p-5 bg-white/5 rounded-3xl border border-white/5">
                        <p class="text-[9px] text-slate-500 uppercase font-black mb-1">Elevation</p>
                        <p id="stat-peak" class="text-2xl font-black text-white">0 <span class="text-xs text-slate-400">M</span></p>
                    </div>
                </div>
            </section>
            <section>
                <h3 class="text-[11px] font-black uppercase text-slate-500 tracking-[0.3em] mb-4">Import Data</h3>
                <div class="flex gap-4">
                    <button onclick="document.getElementById('gpx-input').click()" class="flex-1 py-5 bg-white/5 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-3 active:bg-white/10 transition-all">
                        <i data-lucide="upload-cloud" class="w-5 h-5 text-yellow-400"></i> GPX
                    </button>
                    <button onclick="document.getElementById('photo-input').click()" class="flex-1 py-5 bg-white/5 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-3 active:bg-white/10 transition-all">
                        <i data-lucide="image" class="w-5 h-5 text-blue-400"></i> Photos
                    </button>
                </div>
                <input type="file" id="gpx-input" class="hidden" accept=".gpx">
                <input type="file" id="photo-input" class="hidden" accept="image/*" multiple>
            </section>
            <div id="photo-grid" class="grid grid-cols-3 gap-3 pb-32"></div>
        </div>
    </div>

    <div id="settings-overlay">
        <div class="glass-ui p-10 rounded-[3rem] w-full max-w-sm space-y-8 border-yellow-500/20 border">
            <h3 class="text-2xl font-black tracking-tighter text-white text-center uppercase">System Config</h3>
            <div class="space-y-4">
                <input type="text" id="input-client-id" class="w-full bg-black/60 border border-white/10 rounded-2xl px-5 py-4 text-sm outline-none focus:border-yellow-500" placeholder="Strava Client ID">
                <input type="password" id="input-client-secret" class="w-full bg-black/60 border border-white/10 rounded-2xl px-5 py-4 text-sm outline-none focus:border-yellow-500" placeholder="Strava Client Secret">
            </div>
            <div class="flex flex-col gap-3">
                <button onclick="saveApiSettings()" class="w-full py-5 bg-yellow-500 text-black rounded-2xl font-black text-[11px] uppercase tracking-widest">Update Credentials</button>
                <button id="logout-btn" onclick="disconnectStrava()" class="w-full py-3 bg-red-500/10 text-red-500 rounded-xl font-black text-[10px] uppercase">Disconnect</button>
                <button onclick="toggleSettings()" class="w-full py-2 text-slate-500 text-[10px] font-black uppercase">Close</button>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID_DEF = '212229';
        const CLIENT_SEC_DEF = '68086f28b4970e5856fd8f8d32a7b51df738174d';
        const MT_KEY = "MX9HHSfQg4Ieuv8eCGEY";

        // Logic for high-visibility mobile line scaling
        const DPR = window.devicePixelRatio || 1;
        const MOBILE_FACTOR = DPR > 1.5 ? 1.4 : 1.0; 

        let map, currentTrackCoords = [], waypointMarkers = [];
        let isFlyoverActive = false, flyoverRequestId = null, lastTimestamp = 0, flyoverCurrentDist = 0, flyoverBaseSpeed = 180, movieCursorMarker = null;

        function toggleDrawer() { document.getElementById('asset-drawer').classList.toggle('open'); }
        function toggleSettings() { 
            const keys = getKeys();
            document.getElementById('input-client-id').value = keys.id;
            document.getElementById('input-client-secret').value = keys.secret;
            document.getElementById('logout-btn').style.display = localStorage.getItem('strava_access_token') ? 'block' : 'none';
            document.getElementById('settings-overlay').classList.toggle('active'); 
        }

        function updateUIMessage(msg, active = true) {
            document.getElementById('engine-status').innerText = msg;
            const dot = document.getElementById('live-dot');
            if (active) dot.className = "w-1.5 h-1.5 rounded-full bg-yellow-500 animate-pulse";
            else { dot.className = "w-1.5 h-1.5 rounded-full bg-emerald-500"; document.getElementById('engine-status').innerText = "SYSTEM READY"; }
        }

        function getKeys() { return { id: localStorage.getItem('strava_api_id') || CLIENT_ID_DEF, secret: localStorage.getItem('strava_api_secret') || CLIENT_SEC_DEF }; }
        function saveApiSettings() { const id = document.getElementById('input-client-id').value.trim(); const secret = document.getElementById('input-client-secret').value.trim(); if(id) localStorage.setItem('strava_api_id', id); if(secret) localStorage.setItem('strava_api_secret', secret); window.location.reload(); }

        function updateStravaUI(connected) {
            const connectBtn = document.getElementById('btn-strava-connect');
            const cinemaBtn = document.getElementById('flyover-btn');
            const syncBtn = document.getElementById('sync-btn-small');
            if (connected) { connectBtn.style.setProperty('display', 'none', 'important'); cinemaBtn.style.setProperty('display', 'flex', 'important'); syncBtn.style.setProperty('display', 'flex', 'important'); }
            else { connectBtn.style.setProperty('display', 'flex', 'important'); cinemaBtn.style.setProperty('display', 'none', 'important'); syncBtn.style.setProperty('display', 'none', 'important'); }
        }

        function connectStrava() {
            const keys = getKeys();
            const cleanUrl = window.location.origin + window.location.pathname;
            const url = `https://www.strava.com/oauth/authorize?client_id=${keys.id}&redirect_uri=${encodeURIComponent(cleanUrl)}&response_type=code&scope=activity:read_all`;
            updateUIMessage("CONNECTING...");
            window.location.assign(url);
        }

        function disconnectStrava() { localStorage.removeItem('strava_access_token'); window.location.reload(); }

        async function initAuth() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if(!code) { updateStravaUI(!!localStorage.getItem('strava_access_token')); return; }
            window.history.replaceState({}, document.title, window.location.pathname);
            updateUIMessage("AUTHENTICATING...");
            try {
                const keys = getKeys();
                const res = await fetch('https://www.strava.com/oauth/token', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ client_id: keys.id, client_secret: keys.secret, code: code, grant_type: 'authorization_code' }) });
                const data = await res.json();
                if(data.access_token) { localStorage.setItem('strava_access_token', data.access_token); updateStravaUI(true); fetchLatestStravaActivity(); }
            } catch(e) { updateUIMessage("AUTH ERROR"); }
        }

        async function fetchLatestStravaActivity() {
            const token = localStorage.getItem('strava_access_token');
            if(!token) return;
            const icon = document.getElementById('sync-icon'); if(icon) icon.classList.add('spinning');
            updateUIMessage("FETCHING...");
            try {
                const actsRes = await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=1', { headers: { 'Authorization': `Bearer ${token}` } });
                const activities = await actsRes.json();
                if(!activities || activities.length === 0) { updateUIMessage("NO ACTIVITIES", false); return; }
                const streamsRes = await fetch(`https://www.strava.com/api/v3/activities/${activities[0].id}/streams?keys=latlng,altitude&key_by_type=true`, { headers: { 'Authorization': `Bearer ${token}` } });
                const streams = await streamsRes.json();
                if(streams.latlng) processStreams(streams);
            } catch(e) { updateUIMessage("CONNECTION ERROR"); } finally { if(icon) icon.classList.remove('spinning'); }
        }

        function processStreams(streams) {
            const latlngs = streams.latlng.data, altitudes = streams.altitude ? streams.altitude.data : new Array(latlngs.length).fill(0);
            waypointMarkers.forEach(w => w.marker.remove()); waypointMarkers = [];
            let total = 0, maxEle = -Infinity, maxEleIdx = 0;
            currentTrackCoords = latlngs.map((pt, i) => {
                if(altitudes[i] > maxEle) { maxEle = altitudes[i]; maxEleIdx = i; }
                if(i > 0) total += calculateDistance(latlngs[i-1][0], latlngs[i-1][1], pt[0], pt[1]);
                return [pt[1], pt[0], altitudes[i], total];
            });
            if(map && map.getSource('route')) {
                map.getSource('route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: currentTrackCoords.map(c => [c[0], c[1]]) } });
                addSign(currentTrackCoords[0], '#10b981', 'flag', 'START');
                addSign(currentTrackCoords[currentTrackCoords.length-1], '#ef4444', 'trophy', 'FINISH');
                addSign(currentTrackCoords[maxEleIdx], '#f59e0b', 'mountain', 'PEAK');
                document.getElementById('stat-dist').innerHTML = `${(total/1000).toFixed(2)} <span class="text-xs text-slate-400 uppercase">KM</span>`;
                document.getElementById('stat-peak').innerHTML = `${Math.round(maxEle)} <span class="text-xs text-slate-400 uppercase">M</span>`;
                setTimeout(() => zoomToTrack(), 1000);
            }
            updateUIMessage("READY", false);
        }

        async function secureMapInit() {
            try {
                // Compatibility proxy for MapLibre in sandboxed environments
                const safeLocation = { href: 'https://localhost/', protocol: 'https:', origin: 'https://localhost', host: 'localhost', hostname: 'localhost', pathname: '/', search: '', hash: '', toString: () => 'https://localhost/' };
                const globalProxy = new Proxy(window, { get(t, p) { if (p === 'location') return safeLocation; if (p === 'history') return { pushState: () => {}, replaceState: () => {}, state: null }; if (['URL', 'Blob', 'Worker', 'File', 'FileReader', 'navigator', 'document'].includes(p)) return window[p]; const v = window[p]; if (typeof v === 'function' && !p.startsWith('on')) { try { return v.bind(window); } catch(e) { return v; } } return v; } });
                const libRes = await fetch('https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js');
                const libCode = await libRes.text();
                const bundle = new Function('window', 'self', 'location', 'history', 'globalThis', `${libCode}; return maplibregl;`);
                window.maplibregl = bundle(globalProxy, globalProxy, safeLocation, globalProxy.history, globalProxy);
                initMap();
            } catch (e) { initMap(); }
        }

        function initMap() {
            map = new window.maplibregl.Map({
                container: 'map', style: `https://api.maptiler.com/maps/hybrid/style.json?key=${MT_KEY}`,
                center: [0, 20], zoom: 2, pitch: 0, antialias: true, attributionControl: false, fadeDuration: 0, pixelRatio: DPR 
            });

            map.on('load', () => {
                map.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
                
                // --- V13.0 SOLID CORE RENDERING ---
                // We use one high-visibility layer with dynamic width scaling for mobile screens.
                // No blur/glow layers are used to ensure the "solid" look requested.
                map.addLayer({ id: 'route-line', type: 'line', source: 'route', 
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: { 
                        'line-color': '#facc15', // Vibrant Amber/Yellow for max contrast
                        'line-width': [
                            'interpolate', ['linear'], ['zoom'], 
                            5, 4 * MOBILE_FACTOR, 
                            12, 10 * MOBILE_FACTOR, 
                            18, 24 * MOBILE_FACTOR
                        ],
                        'line-opacity': 1.0
                    }
                });

                // Subtle outline to separate it from very bright satellite pixels
                map.addLayer({ id: 'route-outline', type: 'line', source: 'route', 
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: { 
                        'line-color': '#000', 
                        'line-width': [
                            'interpolate', ['linear'], ['zoom'], 
                            5, 5 * MOBILE_FACTOR, 
                            12, 13 * MOBILE_FACTOR, 
                            18, 28 * MOBILE_FACTOR
                        ],
                        'line-opacity': 0.4
                    }
                }, 'route-line'); // Placed below the primary line

                map.addSource('terrain', { type: 'raster-dem', url: `https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${MT_KEY}`, tileSize: 256 });
                map.setTerrain({ source: 'terrain', exaggeration: 1.5 });
                
                updateUIMessage("READY", false);
                lucide.createIcons();
                initAuth();
            });
            window.addEventListener('resize', () => map.resize());
        }

        function zoomToTrack() {
            if(!currentTrackCoords.length || !map) return;
            map.resize();
            const bounds = new window.maplibregl.LngLatBounds();
            currentTrackCoords.forEach(c => bounds.extend([c[0], c[1]]));
            setTimeout(() => {
                map.resize();
                try { map.fitBounds(bounds, { padding: {top: 120, bottom: 220, left: 60, right: 60}, pitch: 45, duration: 2500, essential: true }); } 
                catch(e) { map.flyTo({ center: [currentTrackCoords[0][0], currentTrackCoords[0][1]], zoom: 14.5, duration: 2000 }); }
            }, 300);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const φ1 = lat1 * Math.PI/180; const φ2 = lat2 * Math.PI/180; const Δφ = (lat2-lat1)*Math.PI/180; const Δλ = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function resetCamera() { map.easeTo({ center: currentTrackCoords.length ? [currentTrackCoords[0][0], currentTrackCoords[0][1]] : [0,0], bearing: 0, pitch: 0, duration: 1200 }); }
        function togglePitch() { map.easeTo({ pitch: map.getPitch() > 10 ? 0 : 70, duration: 800 }); }
        
        function addSign(pt, color, icon, label) {
            const el = document.createElement('div'); el.className = 'waypoint-container';
            el.innerHTML = `<div class="waypoint-icon" style="background: ${color}"><i data-lucide="${icon}" class="text-white w-4 h-4"></i></div><div class="waypoint-label">${label}</div>`;
            const marker = new window.maplibregl.Marker({ element: el, anchor: 'bottom' }).setLngLat([pt[0], pt[1]]).addTo(map);
            waypointMarkers.push({ marker, element: el, coords: [pt[0], pt[1]] });
            lucide.createIcons();
        }

        function toggleFlyover() { isFlyoverActive ? stopFlyover() : startFlyover(); }
        function startFlyover() {
            if(!currentTrackCoords.length) return;
            isFlyoverActive = true; flyoverCurrentDist = 0; lastTimestamp = performance.now();
            document.getElementById('fly-text').innerText = "STOP";
            const el = document.createElement('div'); el.className = 'w-8 h-8 bg-yellow-400 border-[6px] border-black rounded-full shadow-[0_0_20px_rgba(0,0,0,0.8)]';
            movieCursorMarker = new window.maplibregl.Marker({ element: el }).setLngLat([currentTrackCoords[0][0], currentTrackCoords[0][1]]).addTo(map);
            flyoverRequestId = requestAnimationFrame(flyoverLoop);
        }
        function stopFlyover() { isFlyoverActive = false; cancelAnimationFrame(flyoverRequestId); if(movieCursorMarker) { movieCursorMarker.remove(); movieCursorMarker = null; } document.getElementById('fly-text').innerText = "REPLAY"; waypointMarkers.forEach(w => w.element.classList.remove('popup')); }
        
        function flyoverLoop(timestamp) {
            if(!isFlyoverActive || !map) return;
            const delta = (timestamp - lastTimestamp) / 1000; lastTimestamp = timestamp;
            flyoverCurrentDist += flyoverBaseSpeed * delta;
            const totalD = currentTrackCoords[currentTrackCoords.length-1][3];
            if(flyoverCurrentDist >= totalD) return stopFlyover();
            const pos = getPointAtDist(flyoverCurrentDist);
            const next = getPointAtDist(flyoverCurrentDist + 60); 
            waypointMarkers.forEach(w => {
                const dist = calculateDistance(pos[1], pos[0], w.coords[1], w.coords[0]);
                if (dist < 150) w.element.classList.add('popup');
                else if (dist > 300) w.element.classList.remove('popup');
            });
            const bear = (Math.atan2(Math.sin((next[0]-pos[0])*Math.PI/180)*Math.cos(next[1]*Math.PI/180), Math.cos(pos[1]*Math.PI/180)*Math.sin(next[1]*Math.PI/180)-Math.sin(pos[1]*Math.PI/180)*Math.cos(next[1]*Math.PI/180)*Math.cos((next[0]-pos[0])*Math.PI/180))*180/Math.PI+360)%360;
            movieCursorMarker.setLngLat([pos[0], pos[1]]);
            map.jumpTo({ center: [pos[0], pos[1]], bearing: bear, pitch: 65, zoom: 15.8 }); 
            flyoverRequestId = requestAnimationFrame(flyoverLoop);
        }

        function getPointAtDist(d) {
            for(let i=0; i<currentTrackCoords.length-1; i++) {
                const p1 = currentTrackCoords[i], p2 = currentTrackCoords[i+1];
                if(d >= p1[3] && d <= p2[3]) { const r = (d-p1[3])/(p2[3]-p1[3]); return [p1[0]+(p2[0]-p1[0])*r, p1[1]+(p2[1]-p1[1])*r]; }
            }
            return [currentTrackCoords[0][0], currentTrackCoords[0][1]];
        }

        window.onload = () => { 
            initAuth(); 
            lucide.createIcons(); 
            secureMapInit(); 
        };
    </script>
</body>
