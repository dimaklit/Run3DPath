<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run3D Path - Pro Cinematic V6.8</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MapLibre GL JS & CSS -->
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    
    <!-- Utilities -->
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

        body { margin: 0; padding: 0; overflow: hidden; background-color: #020617; font-family: 'Inter', sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; }
        
        /* Layout & Sidebar */
        #main-sidebar {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
        }
        #main-sidebar.collapsed { transform: translateX(-100%); }

        #sidebar-tab {
            position: absolute; left: 100%; top: 24px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-left: none;
            border-radius: 0 12px 12px 0; padding: 16px 10px; cursor: pointer;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s ease;
        }
        #sidebar-tab:hover { background: #6366f1; }

        #main-content {
            transition: margin-left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Photo Overlay */
        #photo-overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95);
            z-index: 2000; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(15px); transition: opacity 0.5s ease; opacity: 0;
        }
        #photo-overlay.active { display: flex; opacity: 1; }
        #photo-overlay img { 
            max-width: 85vw; max-height: 80vh; border-radius: 24px; 
            box-shadow: 0 0 80px rgba(99, 102, 241, 0.4);
            transform: scale(0.9); transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 4px solid rgba(255, 255, 255, 0.1);
        }
        #photo-overlay.active img { transform: scale(1); }

        /* UI Elements */
        .btn-control {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 12px; border-radius: 14px; font-size: 14px; font-weight: 600;
            transition: all 0.2s ease; border: 1px solid transparent;
        }

        .sign-marker {
            display: flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; border-radius: 50%; border: 3px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer;
        }

        .photo-marker {
            width: 54px; height: 54px; border-radius: 14px; border: 3px solid white;
            background-size: cover; background-position: center; cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6); transition: all 0.3s ease;
        }
        .photo-marker:hover { transform: scale(1.1) translateY(-5px); border-color: #6366f1; }

        .movie-cursor {
            width: 24px; height: 24px; background: #6366f1; border: 3px solid white;
            border-radius: 50%; box-shadow: 0 0 20px #6366f1; position: relative;
        }
        .movie-cursor::after {
            content: ''; position: absolute; inset: -12px; border-radius: 50%;
            border: 2px solid #6366f1; animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        #pitch-toggle-btn.is-3d { background-color: #4f46e5; border-color: rgba(255,255,255,0.2); }

        /* Gallery */
        .photo-card {
            position: relative; overflow: hidden; border-radius: 12px; aspect-ratio: 1;
            background-color: #0f172a; border: 2px solid #1e293b; transition: all 0.2s;
            cursor: pointer;
        }
        .photo-card:hover { border-color: #4f46e5; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: opacity 0.2s; }
        .photo-card.enabled img { opacity: 1; }
        .photo-card .toggle-box {
            position: absolute; top: 4px; right: 4px;
            width: 20px; height: 20px; border-radius: 4px;
            background: rgba(15, 23, 42, 0.8); display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .photo-card.enabled .toggle-box { background: #4f46e5; color: white; }
    </style>
</head>
<body class="text-slate-200 antialiased text-sm">

    <!-- Global Error Shield -->
    <script>
        window.addEventListener('error', function(e) {
            if (e.message && (e.message.includes('clearFadeHold') || e.message.includes('navigator'))) {
                e.stopImmediatePropagation(); e.preventDefault(); return false;
            }
        }, true);
    </script>

    <!-- Fullscreen Overlay -->
    <div id="photo-overlay">
        <div class="relative flex flex-col items-center gap-6">
            <img id="overlay-img" src="" alt="View">
            <div class="px-8 py-3 bg-indigo-600/90 backdrop-blur-md rounded-2xl font-bold text-sm uppercase tracking-[0.2em] shadow-2xl border border-white/10">
                Gallery Insight
            </div>
        </div>
    </div>

    <!-- Command Sidebar -->
    <aside id="main-sidebar" class="fixed left-0 top-0 h-full w-80 bg-slate-950/95 border-r border-slate-900 flex flex-col shadow-2xl backdrop-blur-xl">
        <div id="sidebar-tab" onclick="toggleSidebar()">
            <i data-lucide="chevron-left" id="tab-icon" class="text-white w-5 h-5"></i>
        </div>

        <div class="p-8 border-b border-slate-900 flex items-center gap-4">
            <div class="bg-indigo-600 p-2.5 rounded-xl shadow-lg">
                <i data-lucide="mountain-snow" class="text-white w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-xl font-extrabold text-white tracking-tight">Run3D</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-0.5">Turbo Cinematic V6.8</p>
            </div>
        </div>

        <div class="flex-1 p-6 space-y-8 overflow-y-auto custom-scrollbar">
            <section>
                <p class="px-2 mb-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest">Data Source</p>
                <div class="space-y-3">
                    <button id="gpx-btn" onclick="document.getElementById('gpx-input').click()" class="btn-control bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg disabled:bg-slate-900" disabled>
                        <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                        <span>Initializing...</span>
                    </button>
                    <button onclick="document.getElementById('photo-input').click()" class="btn-control bg-slate-900 hover:bg-slate-800 text-slate-300 border-slate-800">
                        <i data-lucide="camera" class="w-4 h-4"></i>
                        <span>Import Photos</span>
                    </button>
                    <input type="file" id="gpx-input" class="hidden" accept=".gpx">
                    <input type="file" id="photo-input" class="hidden" accept="image/*" multiple>
                </div>
            </section>

            <section id="camera-controls" class="hidden animate-in fade-in">
                <p class="px-2 mb-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest">Controls</p>
                <div class="space-y-3">
                    <button id="flyover-btn" onclick="toggleFlyover()" class="btn-control bg-indigo-600/10 hover:bg-indigo-600 text-indigo-400 hover:text-white border border-indigo-500/30">
                        <i data-lucide="clapperboard" class="w-4 h-4"></i>
                        <span id="flyover-btn-text">Cinematic Mode</span>
                    </button>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="zoomToTrack()" class="btn-control bg-slate-900 hover:bg-slate-800 text-[10px] uppercase font-bold">Fit Path</button>
                        <button onclick="resetCamera()" class="btn-control bg-slate-900 hover:bg-slate-800 text-[10px] uppercase font-bold">Reset</button>
                    </div>
                </div>
            </section>

            <!-- Gallery List -->
            <section id="photo-gallery-section" class="hidden">
                <div class="flex items-center justify-between px-2 mb-4">
                    <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest text-nowrap">Photo Gallery</p>
                    <span id="photo-count" class="text-[10px] bg-slate-900 px-2 py-0.5 rounded-full text-slate-400 font-bold">0</span>
                </div>
                <div id="photo-list" class="grid grid-cols-3 gap-2"></div>
            </section>

            <section id="stats-panel" class="hidden">
                <p class="px-2 mb-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest text-nowrap">Live Stats</p>
                <div class="p-5 bg-slate-900/40 rounded-2xl border border-slate-800/50 space-y-4 shadow-inner">
                    <div class="flex items-center justify-between text-xs">
                        <span class="text-slate-500">Distance:</span>
                        <span id="stat-dist" class="text-indigo-400 mono font-bold">-</span>
                    </div>
                    <div class="flex items-center justify-between text-xs">
                        <span class="text-slate-500 text-nowrap">Peak Elevation:</span>
                        <span id="stat-peak" class="text-purple-400 mono font-bold">-</span>
                    </div>
                    <div class="flex items-center justify-between text-xs">
                        <span class="text-slate-500">Top Pace:</span>
                        <span id="stat-speed" class="text-orange-400 mono font-bold">-</span>
                    </div>
                </div>
            </section>
        </div>
    </aside>

    <!-- Map Container -->
    <main id="main-content" class="ml-80 relative flex-1 h-screen overflow-hidden">
        <div id="map">
            <div id="map-loader" class="flex flex-col items-center justify-center h-full gap-5 bg-slate-950">
                <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                <p id="loader-status" class="text-indigo-400 text-[10px] font-black uppercase tracking-widest text-nowrap">CONNECTING TO GRID...</p>
            </div>
        </div>
        
        <div class="absolute top-6 right-6 z-10 flex flex-col gap-3">
            <button id="pitch-toggle-btn" onclick="togglePitch()" class="p-4 bg-slate-950/80 text-white rounded-2xl border border-white/10 shadow-2xl hover:bg-indigo-600 transition-all group">
                <i id="pitch-icon" data-lucide="box" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
            </button>
        </div>

        <div id="alert-box" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] transform translate-y-32 opacity-0 transition-all duration-700">
            <div class="bg-indigo-600 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4">
                <i data-lucide="info" class="w-5 h-5"></i>
                <span id="alert-text" class="text-sm font-bold uppercase"></span>
            </div>
        </div>
    </main>

    <script>
        const MT_KEY = "MX9HHSfQg4Ieuv8eCGEY";
        let map;
        let currentTrackCoords = []; 
        let photoRecords = []; 
        let waypointMarkers = [];
        let isMapReady = false;

        // Flyover Engine
        let isFlyoverActive = false;
        let isPausedForPhoto = false;
        let flyoverRequestId = null;
        let lastTimestamp = 0;
        let flyoverTotalDist = 0;
        let flyoverCurrentDist = 0;
        let flyoverBaseSpeed = 210; // 3x Turbo
        let movieCursorMarker = null;

        function getPointAtDistance(d) {
            if (!currentTrackCoords.length) return null;
            if (d <= 0) return [currentTrackCoords[0][0], currentTrackCoords[0][1], currentTrackCoords[0][2]];
            if (d >= flyoverTotalDist) return [currentTrackCoords[currentTrackCoords.length - 1][0], currentTrackCoords[currentTrackCoords.length - 1][1], 0];

            for (let i = 0; i < currentTrackCoords.length - 1; i++) {
                const p1 = currentTrackCoords[i];
                const p2 = currentTrackCoords[i + 1];
                if (d >= p1[3] && d <= p2[3]) {
                    const ratio = (d - p1[3]) / (p2[3] - p1[3]);
                    return [
                        p1[0] + (p2[0] - p1[0]) * ratio,
                        p1[1] + (p2[1] - p1[1]) * ratio,
                        p1[2] + (p2[2] - p1[2]) * ratio
                    ];
                }
            }
            return [currentTrackCoords[0][0], currentTrackCoords[0][1]];
        }

        function triggerPhotoFullscreen(photo) {
            isPausedForPhoto = true;
            const overlay = document.getElementById('photo-overlay');
            const img = document.getElementById('overlay-img');
            img.src = photo.src;
            overlay.classList.add('active');

            setTimeout(() => {
                overlay.classList.remove('active');
                setTimeout(() => {
                    isPausedForPhoto = false;
                    if (isFlyoverActive) {
                        lastTimestamp = performance.now(); 
                        flyoverRequestId = requestAnimationFrame(flyoverLoop);
                    }
                }, 500);
            }, 1500);
        }

        function flyoverLoop(timestamp) {
            if (!isFlyoverActive || isPausedForPhoto || !map) return;
            if (!lastTimestamp) {
                lastTimestamp = timestamp;
                flyoverRequestId = requestAnimationFrame(flyoverLoop);
                return;
            }
            
            const delta = (timestamp - lastTimestamp) / 1000;
            lastTimestamp = timestamp;

            const currentPos = getPointAtDistance(flyoverCurrentDist);
            if (!currentPos) return;

            for (let photo of photoRecords) {
                if (photo.selected && !photo.visited) {
                    const d = calculateDistance(currentPos[1], currentPos[0], photo.data.lat, photo.data.lon);
                    if (d < 50) {
                        photo.visited = true;
                        triggerPhotoFullscreen(photo);
                        return; 
                    }
                }
            }

            flyoverCurrentDist += flyoverBaseSpeed * delta;
            
            if (flyoverCurrentDist >= flyoverTotalDist) {
                stopFlyover();
                showAlert("ROUTE COMPLETED");
                return;
            }

            const lookAhead = Math.max(30, flyoverBaseSpeed * 0.4);
            const nextPos = getPointAtDistance(flyoverCurrentDist + lookAhead);
            const bearing = calculateBearing(currentPos[1], currentPos[0], nextPos[1], nextPos[0]);

            if (movieCursorMarker) movieCursorMarker.setLngLat([currentPos[0], currentPos[1]]);

            try {
                map.jumpTo({ center: [currentPos[0], currentPos[1]], bearing: bearing, pitch: 75, zoom: 17.5 });
            } catch(e) {}

            flyoverRequestId = requestAnimationFrame(flyoverLoop);
        }

        async function secureMapInit() {
            try {
                const response = await fetch('https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js');
                const libCode = await response.text();
                const safeLocation = { href: 'https://localhost/', protocol: 'https:', host: 'localhost', toString: () => 'https://localhost/' };
                
                const globalProxy = new Proxy(window, {
                    get(t, p) {
                        if (p === 'location') return safeLocation;
                        if (p === 'history') return { pushState: () => {}, replaceState: () => {}, state: null };
                        if (p === 'navigator') return window.navigator;
                        if (p === 'document') return window.document;
                        const v = window[p];
                        if (p === 'URL' || p === 'Blob' || p === 'Worker' || p === 'File' || p === 'FileReader') return v;
                        if (typeof v === 'function') { try { return v.bind(window); } catch(e) { return v; } }
                        return v;
                    }
                });

                const bundle = new Function('window', 'self', 'location', 'history', 'globalThis', `${libCode}; return maplibregl;`);
                window.maplibregl = bundle(globalProxy, globalProxy, safeLocation, globalProxy.history, globalProxy);
                initMapInstance();
            } catch (e) { console.error(e); }
        }

        async function initMapInstance() {
            try {
                const styleRes = await fetch(`https://api.maptiler.com/maps/hybrid/style.json?key=${MT_KEY}`);
                const styleData = await styleRes.json();
                document.getElementById('map-loader').remove();
                
                map = new window.maplibregl.Map({
                    container: 'map', style: styleData, center: [0, 20], zoom: 2, pitch: 0,
                    attributionControl: false, antialias: true, refreshExpiredTiles: false,
                    failIfMajorPerformanceCaveat: false, fadeDuration: 0 
                });

                map.on('load', () => {
                    map.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
                    map.addLayer({ id: 'route-glow', type: 'line', source: 'route', paint: { 'line-color': '#4f46e5', 'line-width': 12, 'line-opacity': 0.3 } });
                    map.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#818cf8', 'line-width': 5 } });
                    map.addSource('terrain', { type: 'raster-dem', url: `https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${MT_KEY}`, tileSize: 256 });
                    
                    map.once('idle', () => {
                        map.setTerrain({ source: 'terrain', exaggeration: 1.5 });
                        toggleLabels(true);
                        isMapReady = true;
                        document.getElementById('gpx-btn').disabled = false;
                        document.getElementById('gpx-btn').innerHTML = '<span>Upload GPX</span>';
                        lucide.createIcons();
                    });
                });
            } catch (e) { }
        }

        function toggleLabels(visible) {
            if (!map) return;
            const layers = map.getStyle().layers;
            layers.forEach(l => {
                if (l.type === 'symbol') { map.setLayoutProperty(l.id, 'visibility', visible ? 'visible' : 'none'); }
            });
        }

        function toggleFlyover() {
            if (!currentTrackCoords.length) return showAlert("LOAD TRACK FIRST");
            isFlyoverActive ? stopFlyover() : startFlyover();
        }

        function startFlyover() {
            isFlyoverActive = true;
            isPausedForPhoto = false;
            flyoverCurrentDist = 0;
            lastTimestamp = performance.now();
            photoRecords.forEach(p => p.visited = false);
            document.getElementById('flyover-btn-text').textContent = "Stop Cinema";
            toggleLabels(false);

            const el = document.createElement('div'); el.className = 'movie-cursor';
            movieCursorMarker = new window.maplibregl.Marker({ element: el })
                .setLngLat([currentTrackCoords[0][0], currentTrackCoords[0][1]])
                .addTo(map);
            
            if (!document.getElementById('main-sidebar').classList.contains('collapsed')) toggleSidebar();
            flyoverRequestId = requestAnimationFrame(flyoverLoop);
        }

        function stopFlyover() {
            isFlyoverActive = false;
            isPausedForPhoto = false;
            cancelAnimationFrame(flyoverRequestId);
            document.getElementById('photo-overlay').classList.remove('active');
            if (movieCursorMarker) { movieCursorMarker.remove(); movieCursorMarker = null; }
            document.getElementById('flyover-btn-text').textContent = "Cinematic Mode";
            toggleLabels(true);
        }

        function addSign(pt, color, icon) {
            const el = document.createElement('div');
            el.className = 'sign-marker'; el.style.backgroundColor = color;
            el.innerHTML = `<i data-lucide="${icon}" class="text-white w-4 h-4"></i>`;
            new window.maplibregl.Marker({ element: el }).setLngLat([pt[0], pt[1]]).addTo(map);
            lucide.createIcons();
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const y = Math.sin(Δλ) * Math.cos(φ2), x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3, φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180, Δφ = (lat2-lat1)*Math.PI/180, Δλ = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        document.getElementById('gpx-input').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const xml = (new DOMParser()).parseFromString(ev.target.result, "text/xml");
                const pts = Array.from(xml.getElementsByTagName("trkpt")).map(p => ({
                    lat: parseFloat(p.getAttribute("lat")), lon: parseFloat(p.getAttribute("lon")),
                    ele: p.getElementsByTagName("ele")[0] ? parseFloat(p.getElementsByTagName("ele")[0].textContent) : 0,
                    time: p.getElementsByTagName("time")[0] ? new Date(p.getElementsByTagName("time")[0].textContent) : null
                }));
                if (!pts.length) return showAlert("EMPTY GPX");

                waypointMarkers.forEach(m => m.remove()); waypointMarkers = [];
                let total = 0, maxEle = -Infinity, maxEleIdx = 0, maxSpd = 0, maxSpdIdx = 0;

                currentTrackCoords = pts.map((p, i) => {
                    if (p.ele > maxEle) { maxEle = p.ele; maxEleIdx = i; }
                    if (i > 0) {
                        const d = calculateDistance(pts[i-1].lat, pts[i-1].lon, p.lat, p.lon);
                        total += d;
                        if (p.time && pts[i-1].time) {
                            const dt = Math.max(0.1, (p.time - pts[i-1].time) / 1000);
                            const spd = d / dt;
                            if (spd > maxSpd && spd < 35) { maxSpd = spd; maxSpdIdx = i; }
                        }
                    }
                    return [p.lon, p.lat, p.ele, total];
                });

                flyoverTotalDist = total;
                map.getSource('route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: currentTrackCoords.map(c => [c[0], c[1]]) } });
                
                addSign(currentTrackCoords[0], '#10b981', 'flag');
                addSign(currentTrackCoords[currentTrackCoords.length-1], '#ef4444', 'trophy');
                addSign(currentTrackCoords[maxEleIdx], '#a855f7', 'mountain');
                if (maxSpd > 0) addSign(currentTrackCoords[maxSpdIdx], '#f59e0b', 'zap');

                document.getElementById('stat-dist').textContent = (total/1000).toFixed(2) + ' km';
                document.getElementById('stat-peak').textContent = Math.round(maxEle) + ' m';
                document.getElementById('stat-speed').textContent = (maxSpd * 3.6).toFixed(1) + ' km/h';

                document.getElementById('camera-controls').classList.remove('hidden');
                document.getElementById('stats-panel').classList.remove('hidden');
                
                const start = [currentTrackCoords[0][0], currentTrackCoords[0][1]];
                const b = currentTrackCoords.reduce((acc, c) => acc.extend([c[0], c[1]]), new window.maplibregl.LngLatBounds(start, start));
                map.fitBounds(b, { padding: 80, pitch: 45, duration: 2000 });
            };
            reader.readAsText(e.target.files[0]);
        });

        document.getElementById('photo-input').addEventListener('change', async (e) => {
            const list = document.getElementById('photo-list');
            const section = document.getElementById('photo-gallery-section');
            section.classList.remove('hidden');

            for (const file of e.target.files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    EXIF.getData(file, function() {
                        const lat = EXIF.getTag(this, "GPSLatitude"), lon = EXIF.getTag(this, "GPSLongitude");
                        if (lat && lon) {
                            const dLat = (lat[0] + lat[1]/60 + lat[2]/3600) * (EXIF.getTag(this, "GPSLatitudeRef") === "S" ? -1 : 1);
                            const dLon = (lon[0] + lon[1]/60 + lat[2]/3600) * (EXIF.getTag(this, "GPSLongitudeRef") === "W" ? -1 : 1);
                            
                            const el = document.createElement('div'); 
                            el.className = 'photo-marker shadow-2xl'; 
                            el.style.backgroundImage = `url(${ev.target.result})`;
                            
                            const photoRec = { marker: null, selected: true, visited: false, src: ev.target.result, data: {lat: dLat, lon: dLon} };
                            
                            el.onclick = (event) => { event.stopPropagation(); triggerPhotoFullscreen(photoRec); };
                            const marker = new window.maplibregl.Marker({ element: el }).setLngLat([dLon, dLat]).addTo(map);
                            photoRec.marker = marker;
                            photoRecords.push(photoRec);

                            const card = document.createElement('div');
                            card.className = 'photo-card enabled';
                            card.innerHTML = `<img src="${ev.target.result}"><div class="toggle-box"><i data-lucide="check" class="w-3 h-3"></i></div>`;
                            
                            card.onclick = () => {
                                photoRec.selected = !photoRec.selected;
                                card.classList.toggle('enabled', photoRec.selected);
                                if (photoRec.selected) photoRec.marker.addTo(map); else photoRec.marker.remove();
                                lucide.createIcons();
                            };
                            card.ondblclick = () => { map.flyTo({ center: [dLon, dLat], zoom: 16, pitch: 60 }); };

                            list.appendChild(card);
                            document.getElementById('photo-count').textContent = photoRecords.length;
                            lucide.createIcons();
                        }
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('main-sidebar');
            const main = document.getElementById('main-content');
            const icon = document.getElementById('tab-icon');
            sidebar.classList.toggle('collapsed');
            
            if (sidebar.classList.contains('collapsed')) {
                main.classList.remove('ml-80'); main.classList.add('ml-0');
                icon.setAttribute('data-lucide', 'chevron-right');
            } else {
                main.classList.remove('ml-0'); main.classList.add('ml-80');
                icon.setAttribute('data-lucide', 'chevron-left');
            }
            
            lucide.createIcons();
            setTimeout(() => { if(map) map.resize(); }, 450);
        }

        function zoomToTrack() { if (!currentTrackCoords.length) return; const start = [currentTrackCoords[0][0], currentTrackCoords[0][1]]; const b = currentTrackCoords.reduce((acc, c) => acc.extend([c[0], c[1]]), new window.maplibregl.LngLatBounds(start, start)); map.fitBounds(b, { padding: 80, pitch: 45, duration: 2000 }); }
        function resetCamera() { stopFlyover(); map.easeTo({ bearing: 0, pitch: 0, duration: 1500 }); }
        
        function togglePitch() { 
            const is3D = map.getPitch() > 10;
            const btn = document.getElementById('pitch-toggle-btn');
            const icon = document.getElementById('pitch-icon');
            map.easeTo({ pitch: is3D ? 0 : 70, duration: 1000 }); 
            if (is3D) { btn.classList.remove('is-3d'); icon.setAttribute('data-lucide', 'box'); } 
            else { btn.classList.add('is-3d'); icon.setAttribute('data-lucide', 'layers-3d'); }
            lucide.createIcons();
        }

        function showAlert(t) { const box = document.getElementById('alert-box'); document.getElementById('alert-text').textContent = t; box.classList.remove('translate-y-32', 'opacity-0'); setTimeout(() => box.classList.add('translate-y-32', 'opacity-0'), 4000); }

        window.onload = secureMapInit;
    </script>
</body>
</html>
