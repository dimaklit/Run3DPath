<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Run3D Path - Strava Cinematic V8.5</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MapLibre GL JS & CSS -->
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    
    <!-- Utilities -->
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

        body { margin: 0; padding: 0; overflow: hidden; background-color: #020617; font-family: 'Inter', sans-serif; touch-action: manipulation; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; background-color: #0f172a; }
        
        #main-sidebar {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
        }
        #main-sidebar.collapsed { transform: translateX(-100%); }

        #sidebar-tab {
            position: absolute; left: 100%; top: 24px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-left: none;
            border-radius: 0 12px 12px 0; padding: 16px 12px; cursor: pointer;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s ease;
            min-width: 50px; min-height: 60px; /* Large touch target */
        }
        #sidebar-tab:hover { background: #6366f1; }

        #main-content { transition: margin-left 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        #photo-overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95);
            z-index: 2000; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(15px); transition: opacity 0.5s ease; opacity: 0;
        }
        #photo-overlay.active { display: flex; opacity: 1; }
        #photo-overlay img { 
            max-width: 85vw; max-height: 80vh; border-radius: 24px; 
            box-shadow: 0 0 80px rgba(99, 102, 241, 0.4);
            transform: scale(0.9); transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 4px solid rgba(255, 255, 255, 0.1);
        }
        #photo-overlay.active img { transform: scale(1); }

        .btn-control {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 14px; border-radius: 16px; font-size: 13px; font-weight: 700;
            transition: all 0.2s ease; border: 1px solid transparent;
            cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        /* Touch feedback */
        .btn-control:active { transform: scale(0.92); background-color: rgba(255, 255, 255, 0.1); }
        .btn-control:disabled { opacity: 0.3; cursor: not-allowed; }

        .sign-marker {
            display: flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; border-radius: 50%; border: 3px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer;
        }

        .photo-marker {
            width: 54px; height: 54px; border-radius: 14px; border: 3px solid white;
            background-size: cover; background-position: center; cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6); transition: all 0.3s ease;
        }

        .movie-cursor {
            width: 24px; height: 24px; background: #6366f1; border: 3px solid white;
            border-radius: 50%; box-shadow: 0 0 20px #6366f1; position: relative;
        }
        .movie-cursor::after {
            content: ''; position: absolute; inset: -12px; border-radius: 50%;
            border: 2px solid #6366f1; animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .btn-strava { background-color: #FC4C02; color: white; }
        .btn-strava:hover { background-color: #E34402; }

        #settings-modal {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(12px); z-index: 3000; display: none;
            align-items: center; justify-content: center; padding: 20px;
        }
        #settings-modal.active { display: flex; }

        .pulse-border { animation: pulse-border-anim 2s infinite; }
        @keyframes pulse-border-anim { 
            0% { border-color: rgba(99, 102, 241, 0.2); }
            50% { border-color: rgba(99, 102, 241, 0.6); box-shadow: 0 0 15px rgba(99, 102, 241, 0.1); }
            100% { border-color: rgba(99, 102, 241, 0.2); }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200 antialiased text-sm">

    <script>
        window.addEventListener('error', function(e) {
            if (e.message && (e.message.includes('clearFadeHold') || e.message.includes('navigator'))) {
                e.stopImmediatePropagation(); e.preventDefault(); return false;
            }
        }, true);
    </script>

    <!-- Overlay UI -->
    <div id="photo-overlay" onclick="this.classList.remove('active')">
        <div class="relative flex flex-col items-center gap-6">
            <img id="overlay-img" src="" alt="View">
            <div class="px-8 py-3 bg-indigo-600/90 backdrop-blur-md rounded-2xl font-bold text-sm uppercase tracking-[0.2em] shadow-2xl border border-white/10">
                Visual Capture
            </div>
        </div>
    </div>

    <!-- API Configuration Modal -->
    <div id="settings-modal">
        <div class="bg-slate-900 border border-indigo-500/20 p-8 md:p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl space-y-8">
            <div class="text-center">
                <div class="inline-flex p-4 bg-indigo-600/10 rounded-2xl mb-4">
                    <i data-lucide="key" class="text-indigo-400 w-8 h-8"></i>
                </div>
                <h3 class="text-2xl font-black text-white tracking-tight">API Setup</h3>
                <p class="text-slate-400 text-xs mt-2 px-4 leading-relaxed">Enter your Strava Developer credentials to enable account syncing.</p>
            </div>
            
            <div class="space-y-5">
                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-black text-slate-500 tracking-[0.15em] ml-1">Client ID</label>
                    <input type="text" id="input-client-id" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-700" placeholder="e.g. 123456">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-black text-slate-500 tracking-[0.15em] ml-1">Client Secret</label>
                    <input type="password" id="input-client-secret" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-700" placeholder="Your 40-char secret">
                </div>
            </div>

            <div class="pt-2 flex flex-col gap-3">
                <button onclick="saveApiSettings()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-600/20 transition-all active:scale-[0.98]">
                    SAVE & CONTINUE
                </button>
                <button onclick="toggleSettings()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-400 font-bold py-3 rounded-2xl transition-all">
                    CANCEL
                </button>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="main-sidebar" class="fixed left-0 top-0 h-full w-80 bg-slate-950/98 border-r border-slate-900 flex flex-col shadow-2xl backdrop-blur-2xl">
        <div id="sidebar-tab" onclick="toggleSidebar()">
            <i data-lucide="chevron-left" id="tab-icon" class="text-white w-5 h-5"></i>
        </div>

        <div class="p-8 border-b border-slate-900 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-2.5 rounded-xl shadow-lg">
                    <i data-lucide="mountain-snow" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-white tracking-tighter">Run3D</h1>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-0.5">V8.5 Ultra Sync</p>
                </div>
            </div>
            <button onclick="toggleSettings()" class="p-2.5 bg-slate-900 rounded-xl text-slate-600 hover:text-indigo-400 border border-slate-800 transition-colors">
                <i data-lucide="settings-2" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="flex-1 p-6 space-y-8 overflow-y-auto custom-scrollbar">
            <!-- Strava Workflow -->
            <section id="strava-section">
                <div class="flex items-center justify-between px-2 mb-4">
                    <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Strava Sync</p>
                    <i data-lucide="shield-check" class="w-3.5 h-3.5 text-emerald-500 opacity-50"></i>
                </div>
                <div class="space-y-4 px-2">
                    <div id="strava-unconnected" class="space-y-4">
                        <!-- Step 1 Card -->
                        <div id="api-status-card" onclick="toggleSettings()" class="p-4 rounded-2xl border bg-slate-900/50 border-slate-800 cursor-pointer transition-all hover:bg-slate-800/50">
                            <div class="flex items-center gap-3">
                                <div id="api-status-icon" class="w-8 h-8 rounded-full flex items-center justify-center bg-slate-950">
                                    <i data-lucide="circle-dashed" class="w-4 h-4 text-slate-600"></i>
                                </div>
                                <div class="flex-1">
                                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-wider">Step 1: API Config</p>
                                    <p id="api-status-text" class="text-[11px] text-slate-400 font-medium">Setup keys...</p>
                                </div>
                            </div>
                        </div>

                        <!-- Step 2 Button -->
                        <button onclick="connectStrava()" id="btn-actual-connect" class="btn-control btn-strava shadow-xl disabled:opacity-20 group transition-all" disabled>
                            <i data-lucide="log-in" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                            <span id="btn-connect-text">STEP 2: LOGIN TO STRAVA</span>
                        </button>
                    </div>

                    <div id="strava-connected" class="hidden space-y-3">
                        <button id="sync-strava-btn" onclick="fetchLatestStravaActivity()" class="btn-control bg-indigo-600 text-white shadow-lg">
                            <i data-lucide="refresh-cw" class="w-4 h-4" id="sync-icon"></i>
                            <span id="sync-btn-text">SYNC LATEST RUN</span>
                        </button>
                        <button onclick="disconnectStrava()" class="w-full py-2 text-[10px] text-slate-500 hover:text-red-400 font-bold uppercase tracking-tighter transition-colors">
                            Logout from Strava
                        </button>
                    </div>
                </div>
            </section>

            <section>
                <p class="px-2 mb-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest text-nowrap text-[10px]">Local Data</p>
                <div class="space-y-3">
                    <button id="gpx-btn" onclick="document.getElementById('gpx-input').click()" class="btn-control bg-slate-900 hover:bg-slate-800 text-slate-300 border-slate-800 disabled:opacity-30" disabled>
                        <i data-lucide="file-up" class="w-4 h-4 text-indigo-400"></i>
                        <span>Upload .GPX</span>
                    </button>
                    <button onclick="document.getElementById('photo-input').click()" class="btn-control bg-slate-900 hover:bg-slate-800 text-slate-300 border-slate-800">
                        <i data-lucide="camera" class="w-4 h-4 text-purple-400"></i>
                        <span>Add Photos</span>
                    </button>
                    <input type="file" id="gpx-input" class="hidden" accept=".gpx">
                    <input type="file" id="photo-input" class="hidden" accept="image/*" multiple>
                </div>
            </section>

            <section id="camera-controls" class="hidden animate-in fade-in">
                <p class="px-2 mb-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest">Controls</p>
                <div class="space-y-3">
                    <button id="flyover-btn" onclick="toggleFlyover()" class="btn-control bg-indigo-600/10 hover:bg-indigo-600 text-indigo-400 hover:text-white border border-indigo-500/30">
                        <i data-lucide="clapperboard" class="w-4 h-4"></i>
                        <span id="flyover-btn-text">Cinematic Mode</span>
                    </button>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="zoomToTrack()" class="btn-control bg-slate-900 hover:bg-slate-800 text-[10px] uppercase font-bold text-nowrap">Fit View</button>
                        <button onclick="resetCamera()" class="btn-control bg-slate-900 hover:bg-slate-800 text-[10px] uppercase font-bold text-nowrap">Reset</button>
                    </div>
                </div>
            </section>
        </div>
    </aside>

    <main id="main-content" class="ml-80 relative flex-1 h-screen overflow-hidden">
        <div id="map">
            <div id="map-loader" class="flex flex-col items-center justify-center h-full gap-5 bg-slate-950">
                <div class="w-20 h-20 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-indigo-400 text-[11px] font-black uppercase tracking-[0.3em]">WAKING UP CORE...</p>
            </div>
        </div>
        
        <div class="absolute top-6 right-6 z-10 flex flex-col gap-3">
            <button id="pitch-toggle-btn" onclick="togglePitch()" class="p-4 bg-slate-950/90 text-white rounded-2xl border border-white/5 shadow-2xl hover:bg-indigo-600 transition-all group">
                <i id="pitch-icon" data-lucide="box" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
            </button>
        </div>

        <div id="alert-box" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] transform translate-y-32 opacity-0 transition-all duration-700">
            <div class="bg-indigo-600 text-white px-8 py-5 rounded-3xl shadow-2xl flex items-center gap-5 border border-white/10 backdrop-blur-md">
                <i data-lucide="bell" class="w-6 h-6"></i>
                <span id="alert-text" class="text-sm font-black uppercase tracking-tight"></span>
            </div>
        </div>
    </main>

    <script>
        // --- API HELPERS & CREDENTIALS ---
        function getKeys() {
            try {
                const id = localStorage.getItem('strava_api_id') || '212229';
                const secret = localStorage.getItem('strava_api_secret') || '68086f28b4970e5856fd8f8d32a7b51df738174d';
                return { id, secret };
            } catch(e) { return { id: '212229', secret: '68086f28b4970e5856fd8f8d32a7b51df738174d' }; }
        }

        let STRAVA_CLIENT_ID = getKeys().id;
        let STRAVA_CLIENT_SECRET = getKeys().secret;
        const MT_KEY = "MX9HHSfQg4Ieuv8eCGEY";

        let map, currentTrackCoords = [], photoRecords = [], waypointMarkers = [];
        let isMapReady = false, isFlyoverActive = false, isPausedForPhoto = false, flyoverRequestId = null, lastTimestamp = 0, flyoverTotalDist = 0, flyoverCurrentDist = 0, flyoverBaseSpeed = 210, movieCursorMarker = null;

        // --- UI SYNC ---
        function updateApiStatusUI() {
            const card = document.getElementById('api-status-card');
            const icon = document.getElementById('api-status-icon');
            const text = document.getElementById('api-status-text');
            const connectBtn = document.getElementById('btn-actual-connect');
            const keys = getKeys();

            if (keys.id && keys.secret) {
                card.className = 'p-4 rounded-2xl border border-emerald-500/30 bg-emerald-500/5 transition-all cursor-pointer hover:bg-emerald-500/10';
                icon.innerHTML = '<i data-lucide="check-circle" class="text-emerald-400 w-5 h-5"></i>';
                text.innerHTML = 'API Status: <span class="text-emerald-400 font-black">ACTIVE</span>';
                connectBtn.disabled = false;
                connectBtn.classList.remove('opacity-20');
                card.classList.remove('pulse-border');
            } else {
                card.className = 'p-4 rounded-2xl border border-slate-800 bg-slate-900/50 transition-all cursor-pointer hover:bg-slate-800 pulse-border';
                icon.innerHTML = '<i data-lucide="alert-circle" class="text-indigo-400 w-5 h-5"></i>';
                text.innerHTML = 'Step 1: <span class="text-white font-bold text-[10px] uppercase tracking-tight">Setup API Keys</span>';
                connectBtn.disabled = true;
                connectBtn.classList.add('opacity-20');
            }
            lucide.createIcons();
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            const keys = getKeys();
            document.getElementById('input-client-id').value = keys.id;
            document.getElementById('input-client-secret').value = keys.secret;
            modal.classList.toggle('active');
        }

        function saveApiSettings() {
            const id = document.getElementById('input-client-id').value.trim();
            const secret = document.getElementById('input-client-secret').value.trim();
            if(!id || isNaN(id)) return showAlert("CLIENT ID MUST BE NUMERIC");
            if(secret.length < 5) return showAlert("CLIENT SECRET INVALID");

            try {
                localStorage.setItem('strava_api_id', id);
                localStorage.setItem('strava_api_secret', secret);
                STRAVA_CLIENT_ID = id; STRAVA_CLIENT_SECRET = secret;
                updateApiStatusUI(); toggleSettings();
                showAlert("API KEYS UPDATED.");
            } catch(e) { showAlert("STORAGE ERROR"); }
        }

        function resetSyncUI() {
            const syncIcon = document.getElementById('sync-icon');
            const syncBtnText = document.getElementById('sync-btn-text');
            if(syncIcon) syncIcon.classList.remove('animate-spin');
            if(syncBtnText) syncBtnText.innerText = "SYNC LATEST RUN";
        }

        // --- STRAVA FLOW ---
        function connectStrava() {
            const keys = getKeys();
            if (!keys.id) { toggleSettings(); return; }
            const redirectUri = window.location.href.split('?')[0].split('#')[0];
            const scope = 'activity:read_all';
            const authUrl = `https://www.strava.com/oauth/authorize?client_id=${keys.id}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=code&scope=${scope}`;
            showAlert("OPENING STRAVA...");
            try {
                window.open(authUrl, '_top');
            } catch (e) {
                const link = document.createElement('a');
                link.href = authUrl; link.target = '_top';
                document.body.appendChild(link); link.click();
            }
        }

        async function handleStravaCallback() {
            const code = new URLSearchParams(window.location.search).get('code');
            if (!code) return updateStravaUI(!!localStorage.getItem('strava_access_token'));

            window.history.replaceState({}, document.title, window.location.pathname);
            showAlert("AUTHENTICATING...");
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);

            try {
                const keys = getKeys();
                const response = await fetch('https://www.strava.com/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ client_id: keys.id, client_secret: keys.secret, code, grant_type: 'authorization_code' }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const data = await response.json();
                if (data.access_token) {
                    localStorage.setItem('strava_access_token', data.access_token);
                    updateStravaUI(true);
                    showAlert("LOGGED IN! FETCHING RUN...");
                    setTimeout(() => fetchLatestStravaActivity(), 500);
                } else showAlert("AUTH FAILED");
            } catch (e) { showAlert("CONNECTION ERROR"); }
        }

        function disconnectStrava() { localStorage.removeItem('strava_access_token'); updateStravaUI(false); showAlert("LOGGED OUT"); }
        function updateStravaUI(isConnected) {
            document.getElementById('strava-unconnected').classList.toggle('hidden', isConnected);
            document.getElementById('strava-connected').classList.toggle('hidden', !isConnected);
        }

        async function fetchLatestStravaActivity() {
            const token = localStorage.getItem('strava_access_token');
            if (!token) return showAlert("NOT LOGGED IN");

            const syncIcon = document.getElementById('sync-icon');
            const syncBtnText = document.getElementById('sync-btn-text');
            if(syncIcon) syncIcon.classList.add('animate-spin');
            if(syncBtnText) syncBtnText.innerText = "SYNCING...";
            
            showAlert("FETCHING FROM STRAVA...");
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 20000);

            try {
                const actsRes = await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=1', { 
                    headers: { 'Authorization': `Bearer ${token}` }, signal: controller.signal
                });
                if (actsRes.status === 401) { localStorage.removeItem('strava_access_token'); updateStravaUI(false); throw new Error("Expired session"); }
                const activities = await actsRes.json();
                if (!activities.length) { showAlert("NO RUNS FOUND"); resetSyncUI(); return; }

                const streamsRes = await fetch(`https://www.strava.com/api/v3/activities/${activities[0].id}/streams?keys=latlng,altitude&key_by_type=true`, { 
                    headers: { 'Authorization': `Bearer ${token}` }, signal: controller.signal
                });
                const streams = await streamsRes.json();
                clearTimeout(timeoutId);

                if (streams.latlng) { processStravaStreams(streams); showAlert("PATH SYNCED SUCCESSFULLY!"); } 
                else showAlert("LAST RUN HAS NO GPS DATA");
            } catch (e) { showAlert("SYNC FAILED"); } finally { resetSyncUI(); }
        }

        function processStravaStreams(streams) {
            if (!map || !map.getSource('route')) return;
            const latlngs = streams.latlng.data, altitudes = streams.altitude ? streams.altitude.data : new Array(latlngs.length).fill(0);
            waypointMarkers.forEach(m => m.remove()); waypointMarkers = [];
            let total = 0, maxEle = -Infinity, maxEleIdx = 0;
            currentTrackCoords = latlngs.map((pt, i) => {
                if (altitudes[i] > maxEle) { maxEle = altitudes[i]; maxEleIdx = i; }
                if (i > 0) total += calculateDistance(latlngs[i-1][0], latlngs[i-1][1], pt[0], pt[1]);
                return [pt[1], pt[0], altitudes[i], total];
            });
            flyoverTotalDist = total;
            map.getSource('route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: currentTrackCoords.map(c => [c[0], c[1]]) } });
            addSign(currentTrackCoords[0], '#10b981', 'flag'); 
            addSign(currentTrackCoords[currentTrackCoords.length-1], '#ef4444', 'trophy'); 
            addSign(currentTrackCoords[maxEleIdx], '#a855f7', 'mountain');
            document.getElementById('camera-controls').classList.remove('hidden'); 
            
            // Auto fit after sync with extra delay for source propagation
            setTimeout(() => zoomToTrack(), 600);
        }

        // --- MAP ENGINE ---
        function getPointAtDistance(d) {
            if (!currentTrackCoords.length) return null;
            if (d <= 0) return [currentTrackCoords[0][0], currentTrackCoords[0][1], currentTrackCoords[0][2]];
            if (d >= flyoverTotalDist) return [currentTrackCoords[currentTrackCoords.length-1][0], currentTrackCoords[currentTrackCoords.length-1][1], 0];
            for (let i = 0; i < currentTrackCoords.length - 1; i++) {
                const p1 = currentTrackCoords[i], p2 = currentTrackCoords[i + 1];
                if (d >= p1[3] && d <= p2[3]) {
                    const ratio = (d - p1[3]) / (p2[3] - p1[3]);
                    return [ p1[0] + (p2[0] - p1[0]) * ratio, p1[1] + (p2[1] - p1[1]) * ratio, p1[2] + (p2[2] - p1[2]) * ratio ];
                }
            }
            return [currentTrackCoords[0][0], currentTrackCoords[0][1]];
        }

        function triggerPhotoFullscreen(photo) {
            isPausedForPhoto = true; document.getElementById('overlay-img').src = photo.src; document.getElementById('photo-overlay').classList.add('active');
            setTimeout(() => { document.getElementById('photo-overlay').classList.remove('active'); setTimeout(() => { isPausedForPhoto = false; if (isFlyoverActive) { lastTimestamp = performance.now(); flyoverRequestId = requestAnimationFrame(flyoverLoop); } }, 500); }, 1500);
        }

        function flyoverLoop(timestamp) {
            if (!isFlyoverActive || isPausedForPhoto || !map) return;
            if (!lastTimestamp) { lastTimestamp = timestamp; flyoverRequestId = requestAnimationFrame(flyoverLoop); return; }
            const delta = (timestamp - lastTimestamp) / 1000; lastTimestamp = timestamp;
            const currentPos = getPointAtDistance(flyoverCurrentDist);
            if (!currentPos) return;
            for (let photo of photoRecords) { if (photo.selected && !photo.visited) { if (calculateDistance(currentPos[1], currentPos[0], photo.data.lat, photo.data.lon) < 50) { photo.visited = true; triggerPhotoFullscreen(photo); return; } } }
            flyoverCurrentDist += flyoverBaseSpeed * delta;
            if (flyoverCurrentDist >= flyoverTotalDist) { stopFlyover(); showAlert("TRACK COMPLETE!"); return; }
            const lookAhead = Math.max(30, flyoverBaseSpeed * 0.4), nextPos = getPointAtDistance(flyoverCurrentDist + lookAhead);
            const bearing = calculateBearing(currentPos[1], currentPos[0], nextPos[1], nextPos[0]);
            if (movieCursorMarker) movieCursorMarker.setLngLat([currentPos[0], currentPos[1]]);
            try { map.jumpTo({ center: [currentPos[0], currentPos[1]], bearing, pitch: 75, zoom: 17.5 }); } catch(e) {}
            flyoverRequestId = requestAnimationFrame(flyoverLoop);
        }

        async function secureMapInit() {
            try {
                const safeLocation = { href: 'https://localhost/', protocol: 'https:', origin: 'https://localhost', host: 'localhost', hostname: 'localhost', pathname: '/', search: '', hash: '', toString: () => 'https://localhost/' };
                const globalProxy = new Proxy(window, {
                    get(t, p) {
                        if (p === 'location') return safeLocation;
                        if (p === 'history') return { pushState: () => {}, replaceState: () => {}, state: null };
                        if (['URL', 'Blob', 'Worker', 'File', 'FileReader', 'navigator', 'document'].includes(p)) return window[p];
                        const v = window[p];
                        if (typeof v === 'function' && !p.startsWith('on')) { try { return v.bind(window); } catch(e) { return v; } }
                        return v;
                    }
                });
                const libResponse = await fetch('https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js');
                const libCode = await libResponse.text();
                const bundle = new Function('window', 'self', 'location', 'history', 'globalThis', `${libCode}; return maplibregl;`);
                window.maplibregl = bundle(globalProxy, globalProxy, safeLocation, globalProxy.history, globalProxy);
                
                initMapInstance();
                handleStravaCallback(); 
                updateApiStatusUI();
            } catch (e) { console.error("Secure boot failed:", e); }
        }

        async function initMapInstance() {
            try {
                const loader = document.getElementById('map-loader'); if (loader) loader.remove();
                map = new window.maplibregl.Map({ container: 'map', style: `https://api.maptiler.com/maps/hybrid/style.json?key=${MT_KEY}`, center: [0, 20], zoom: 2, pitch: 0, attributionControl: false, antialias: true, fadeDuration: 0 });
                map.on('load', () => {
                    map.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
                    map.addLayer({ id: 'route-glow', type: 'line', source: 'route', paint: { 'line-color': '#4f46e5', 'line-width': 12, 'line-opacity': 0.3 } });
                    map.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#818cf8', 'line-width': 5 } });
                    map.addSource('terrain', { type: 'raster-dem', url: `https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${MT_KEY}`, tileSize: 256 });
                    map.once('idle', () => { map.setTerrain({ source: 'terrain', exaggeration: 1.5 }); toggleLabels(true); isMapReady = true; document.getElementById('gpx-btn').disabled = false; lucide.createIcons(); });
                });
                window.addEventListener('resize', () => map.resize());
            } catch (e) { }
        }

        function toggleLabels(visible) { if (!map) return; map.getStyle().layers.forEach(l => { if (l.type === 'symbol') map.setLayoutProperty(l.id, 'visibility', visible ? 'visible' : 'none'); }); }
        
        function toggleFlyover() { 
            if (!currentTrackCoords.length) return showAlert("IMPORT TRACK FIRST"); 
            if(isFlyoverActive) stopFlyover(); else startFlyover(); 
        }

        function startFlyover() {
            isFlyoverActive = true; isPausedForPhoto = false; flyoverCurrentDist = 0; lastTimestamp = performance.now(); photoRecords.forEach(p => p.visited = false);
            document.getElementById('flyover-btn-text').textContent = "Stop Cinema"; toggleLabels(false);
            const el = document.createElement('div'); el.className = 'movie-cursor';
            movieCursorMarker = new window.maplibregl.Marker({ element: el }).setLngLat([currentTrackCoords[0][0], currentTrackCoords[0][1]]).addTo(map);
            if (!document.getElementById('main-sidebar').classList.contains('collapsed')) toggleSidebar();
            flyoverRequestId = requestAnimationFrame(flyoverLoop);
        }

        function stopFlyover() { 
            isFlyoverActive = false; isPausedForPhoto = false; cancelAnimationFrame(flyoverRequestId); 
            if (movieCursorMarker) { movieCursorMarker.remove(); movieCursorMarker = null; } 
            document.getElementById('flyover-btn-text').textContent = "Cinematic Mode"; toggleLabels(true); 
        }

        function addSign(pt, color, icon) { 
            const el = document.createElement('div'); el.className = 'sign-marker'; el.style.backgroundColor = color; 
            el.innerHTML = `<i data-lucide="${icon}" class="text-white w-4 h-4"></i>`; 
            waypointMarkers.push(new window.maplibregl.Marker({ element: el }).setLngLat([pt[0], pt[1]]).addTo(map)); lucide.createIcons(); 
        }

        function calculateDistance(lat1, lon1, lat2, lon2) { const R = 6371e3, φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180, Δφ = (lat2-lat1)*Math.PI/180, Δλ = (lon2-lon1)*Math.PI/180, a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2; return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
        function calculateBearing(lat1, lon1, lat2, lon2) { const φ1 = lat1*Math.PI/180, φ2 = lat2*Math.PI/180, Δλ = (lon2-lon1)*Math.PI/180, y = Math.sin(Δλ)*Math.cos(φ2), x = Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ); return (Math.atan2(y, x)*180/Math.PI + 360) % 360; }

        document.getElementById('gpx-input').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const xml = (new DOMParser()).parseFromString(ev.target.result, "text/xml");
                const pts = Array.from(xml.getElementsByTagName("trkpt")).map(p => ({ lat: parseFloat(p.getAttribute("lat")), lon: parseFloat(p.getAttribute("lon")), ele: p.getElementsByTagName("ele")[0] ? parseFloat(p.getElementsByTagName("ele")[0].textContent) : 0 }));
                if (!pts.length) return showAlert("EMPTY GPX");
                waypointMarkers.forEach(m => m.remove()); waypointMarkers = [];
                let total = 0, maxEle = -Infinity, maxEleIdx = 0;
                currentTrackCoords = pts.map((p, i) => { if (p.ele > maxEle) { maxEle = p.ele; maxEleIdx = i; } if (i > 0) total += calculateDistance(pts[i-1].lat, pts[i-1].lon, p.lat, p.lon); return [p.lon, p.lat, p.ele, total]; });
                flyoverTotalDist = total; map.getSource('route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: currentTrackCoords.map(c => [c[0], c[1]]) } });
                addSign(currentTrackCoords[0], '#10b981', 'flag'); addSign(currentTrackCoords[currentTrackCoords.length-1], '#ef4444', 'trophy'); addSign(currentTrackCoords[maxEleIdx], '#a855f7', 'mountain');
                document.getElementById('camera-controls').classList.remove('hidden'); 
                setTimeout(() => zoomToTrack(), 500);
            };
            reader.readAsText(e.target.files[0]);
        });

        document.getElementById('photo-input').addEventListener('change', async (e) => {
            for (const file of e.target.files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    EXIF.getData(file, function() {
                        const lat = EXIF.getTag(this, "GPSLatitude"), lon = EXIF.getTag(this, "GPSLongitude");
                        if (lat && lon) {
                            const dLat = (lat[0] + lat[1]/60 + lat[2]/3600) * (EXIF.getTag(this, "GPSLatitudeRef") === "S" ? -1 : 1);
                            const dLon = (lon[0] + lon[1]/60 + lat[2]/3600) * (EXIF.getTag(this, "GPSLongitudeRef") === "W" ? -1 : 1);
                            const el = document.createElement('div'); el.className = 'photo-marker shadow-2xl'; el.style.backgroundImage = `url(${ev.target.result})`;
                            const photoRec = { marker: null, selected: true, visited: false, src: ev.target.result, data: {lat: dLat, lon: dLon} };
                            el.onclick = (event) => { event.stopPropagation(); triggerPhotoFullscreen(photoRec); };
                            photoRec.marker = new window.maplibregl.Marker({ element: el }).setLngLat([dLon, dLat]).addTo(map); photoRecords.push(photoRec);
                        }
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('main-sidebar'), main = document.getElementById('main-content'), icon = document.getElementById('tab-icon');
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) { main.classList.remove('ml-80'); main.classList.add('ml-0'); icon.setAttribute('data-lucide', 'chevron-right'); } 
            else { main.classList.remove('ml-0'); main.classList.add('ml-80'); icon.setAttribute('data-lucide', 'chevron-left'); }
            lucide.createIcons(); 
            setTimeout(() => { if(map) { map.resize(); } }, 450);
        }

        // --- ULTRA-ROBUST FIT VIEW LOGIC ---
        function zoomToTrack() { 
            if (!currentTrackCoords.length || !map) return showAlert("NO TRACK LOADED"); 
            
            showAlert("TARGETING PATH..."); 

            // 1. Force multiple resizes to be absolutely sure container is recognized
            map.resize();
            
            const bounds = new window.maplibregl.LngLatBounds();
            currentTrackCoords.forEach(c => bounds.extend([c[0], c[1]]));

            if (bounds.isEmpty()) return;

            // 2. Responsive Padding calculation
            const isMobile = window.innerWidth < 768;
            const pad = isMobile ? 30 : 100;

            // 3. Execution after DOM settling delay
            setTimeout(() => {
                map.resize(); // Second resize right before movement
                
                try {
                    // Try fitBounds first
                    map.fitBounds(bounds, { 
                        padding: pad, 
                        pitch: 45, 
                        duration: 3000, // Longer duration for smoother visual confirmation
                        essential: true
                    }); 
                } catch (e) {
                    console.error("Bounds calculation failed, falling back to center-zoom.");
                    // Emergency fallback: flyTo the first coordinate
                    map.flyTo({ 
                        center: [currentTrackCoords[0][0], currentTrackCoords[0][1]], 
                        zoom: 14,
                        pitch: 45,
                        essential: true
                    });
                }
            }, 300);
        }

        function resetCamera() { stopFlyover(); map.easeTo({ center: currentTrackCoords.length ? [currentTrackCoords[0][0], currentTrackCoords[0][1]] : [0,0], bearing: 0, pitch: 0, duration: 1500 }); }
        function togglePitch() { const is3D = map.getPitch() > 10; map.easeTo({ pitch: is3D ? 0 : 70, duration: 1000 }); }
        function showAlert(t) { const box = document.getElementById('alert-box'); document.getElementById('alert-text').textContent = t; box.classList.remove('translate-y-32', 'opacity-0'); setTimeout(() => box.classList.add('translate-y-32', 'opacity-0'), 4000); }

        window.onload = secureMapInit;
    </script>
